body:
  text: 吳中金石新編卷五明陳暐編祠廟重修至徳廟記周忱宣徳五年秋七月禮部郎中豫章况鍾伯律奉璽書擢守於蘇州視事之日吏以囚牘進見民之繋於獄者凡千餘人尚争務勝交相訐訟有經十餘載而未决者伯律姑置弗問曰明日率郡之父老祗謁於吳泰伯廟見其堂宇傾仆垣墉頺圮吏民奉祀弗䖍乃喟然歎曰民不見徳宜乎刑之不清也是非郡守之先務乎即日命工度材撤其舊而新之曰堂曰室曰門曰廡為屋凡四十楹繚以周垣堅以甓甃不十日而告成復率父老潔牲醪祗祀於廟居人過客瞻望咨嗟於是獄之繋囚交相愧悔曰泰伯以天下讓民無得而稱焉吾輩所争僅錐刀之末耳何重貽郡侯之羞乎皆相與俯伏庭下自服其辜不數日而獄以空虚告予時奉命廵撫於江南列郡至蘇州祗謁祠下父老以其事告且曰昔者狄梁公以冬官侍郎為江南廵撫使毁吳楚淫祠千七百所而此廟則在所留而不毁者去今千有餘年得吳郡侯葺而新之廵撫使之來又適當其時吳民觀感興起自今其無復争競之風乎子乃登進其父老而告之曰方泰伯之奔吳也斷髮文身示不可立然荆蠻義之從而歸之千餘家遂端委以臨其民是欲辭富貴而富貴隨之及其後世夫差狃於必勝窮兵瀆武破越困齊欲霸中土卒之國亡身戮妻子為虜是欲求富彊而失其富彊矣然則吳地數千年之富庻由泰伯之三讓有以致之也其鬭訟之成風者亦由夫差之好勝有以啓之也爾民欲為泰伯之讓乎欲效夫差之争乎一則廟食萬世一則貽譏千載其得與失必有能辨之者孔子曰能以禮讓為國乎何有此予與太守期望於吾民之意父老曰善請以是為記遂書於麗牲之石使四方之來謁者咸有所觀感而興起焉豈獨蘇州之民而已哉重新至徳廟記陳音自泰伯逃於吳民戴其徳以有國傳二十餘世而越始入吳吳人懐泰伯之徳不忍其竟弗祀也東漢吳郡守糜豹肇建至徳廟於閶門外以慰民懐歴六朝至隋而唐狄梁公廵撫江南盡毁諸淫祠而此廟特存五代時錢武肅王徙廟於城中有宋諸名公吏於吳者凡有禱輙應焉國朝宣徳間郡守况鍾伯律因舊廟修之凡為屋四十楹閲嵗乆復敝頃監察御史張淮邦鎮奉朝命按吳祗謁廟下病其敝且隘也命有司撤而新之堂廡門垣之制雖仍乎舊而髙敞宏廓則視昔大有加矣於乎天生民有欲易争争在利與名耳利莫太於有天下泰伯以天下讓不欲自有其名此其所以為至徳而孔子稱之後世雖微利輙争争輙自以為是而加不美之名於人小者鬬訟以犯於有司大者興兵戈以糜爛其民是真泰伯之罪人哉泰伯之後夀夢欲傳位季札亦猶太王欲立季歴之意也諸樊餘祭夷昩不能如泰伯仲雍之讓吳於是乎不競闔廬夫差復好大喜争竟召甬東之辱以底於亡嗚呼始以讓而興終以争而亡民之鑒於是者尚宜慎所趨哉夫民之趨舍繋乎上上好㢘則墨者息上好直則佞者阻上好讓則争者愧邦鎮厭吳民多争訟特新至徳廟以重愧之可謂善斡旋民風而使之興讓哉邦鎮河南襄城人登己丑進士歴知山陽蕪湖二縣事皆務以徳化民今憲節至吳復有旌徳化俗之舉可謂尚徳君子矣廟功告成郡同知毛瑄推官樊廷選請予紀其事於石用書此以嘉邦鎮之績後之吏民其皆務尚徳息争以仰視斯廟而無愧哉吳相伍君廟碑王鏊吳之先介在蠻夷不與中國通者十九世自巫臣教射御而後知有武季子觀周樂而後知有文當是時吳漸進矣其後伍君來奔自楚以闔閭霸遂拔舒遂伐越遂滅徐入郢之舉楚國幾墟延及黄池遂冠帶以主夏盟其伐齊先晉争衡上國雖非君心而其强至此則君之力也吳之不終霸也人皆咎夫差之不能用君竊獨嘆闔閭之知君而不究其用也柏舉之戰春秋許其與憂中國而其責隨也必以周室為請君之所仗可知矣使闔閭而究其用命君禁兵輯掠提壃籍户歸之周室而已不與則此役也楚可滅周可興吳可强於天下惜乎籍館返夷而事去矣先儒謂此闔閭羣臣之過非君意也夫豈獨非其意將必力諍而莫之聴也然吳自此遂通上國至於禮樂財賦甲於天下君實啓之故自春秋律之則以夷干夏自今日論之則以夏變夷其有功於吳大矣微君吾其尚祝髮文身乎忠孝天下大節也而君值其難其去楚孝也而所復者君其諫吳忠也而所忘者身方楚之以免父召死之可也諫吳不式去之可也而君以其邁往之氣行之不惑義在親親重親重則死於親義在君君重君重則死於君世謂可以死不死不死將以有為也可以無死而死死將以明道也君死而吳亦亡矣千載而下過其所謂吳東門凛凛尚有生氣於乎豈非間世之人豪哉義氣之在天地萬古不息也盖嘗與日月山川雷電風雨流行磅礴於兩間其有所鍾則出為雄渾竒傑之材以立盖世非常之功為臣死忠為子死孝死也其不盡者復與日月争光與天地無窮與風雨雷雷揮霍乎上下而况君之故邦也哉君之廟食於吳也乆廟故在城之盤門庚子秋不戒於火明年夏髙唐劉公魁以監察御史蒞吳首以忠孝風勵吳人出令新之蘇守蠡吾劉侯瑀奮曰余維守土其有不承鎮撫徐昇主簿于通典史張灝偕力競勸朞月廟成麗牲有石謂鏊當紀其事鏊謂事有闗乎綱常勢若逆而理順政有係乎風化事雖勞而民悦劉公其知政之體要矣古祀君有小海歌鏊為詩以凖其辭曰天挺人豪遭時多虞挾弓貫矢去楚歸吳吳子曰嘻烈哉丈夫我其觀兵以信子志君拜稽首君父無二復父之仇虧君之義遵養俟時退耕於野唐蔡來歸楚有囊瓦瀆貨翫兵慿陵諸夏君曰可矣陳於柏舉一戰入之裒荆之旅既以吳霸越遂可并賊嚭為讒豢於行成不思自衛壊萬里城嗟嗟維君兩罹讒口楚既幾亡吳亦旋沼君雖云亡耿有餘烈懸目吳門非以觀越越兵其來餘威可折君之義氣横乎兩間鞭叱風雷上下于天溥彼吳城君所完者君今去矣婘焉是舎曷不觀乎素車白馬出沒潮頭凛然如在吳人思君廟貌時新坎坎撃鼔以妥君神神入居之降康襲祉無水旱蝗天扎癘疵千萬斯年以食廟祀重修陽山白龍祠記金幼孜龍之為靈著矣下上日星浮游海嶽感風雲霈惠澤變幻恍惚不可為像則夫世之所稱神靈有逾於龍者哉宜其肇迹之地人益崇信廟食之乆神愈彰應而祀典之盛累千百年為不替焉距姑蘇郡城西二舎許曰陽山有白龍祠其神誕育之異相傳肇自晉隆安中而其靈顯感應莫盛於唐尤莫盛於宋元之間錫號崇祀後先相望逮我聖朝飭嚴祀事命有司春秋致祭著在令典乃宣徳五年禮部郎中况鍾伯律奉命來守是邦嵗夏秋之交闔郡大旱禾則盡槁伯律乃攄誠禱神已而大雨沾溉嵗以獲稔仲秋之月適當祀神先期望夕伯律齋宿公館夢神告以祠宇將傾丐即修葺翌日以其故語諸僚佐咸嗟異之將事之旦天氣澄明靈飈颯爽雲彩發祥蜿蜒焜燿至誠感孚神實降歆既竣事伯律周覽祠下喟無以妥神靈宜乎神之預協夢徴吾儕忝蒞斯郡詎可不思改創以答神休耶遂倡郡邑僚屬捐俸市材鳩工而重修之而民之好事樂助者益衆未幾棟宇赫奕廟貌一新既相與落其成復謀勒貞石以貽永乆伯律乃致書請余文記之惟禦災捍患神之功而事神治人守之職也白龍之神其肇迹之故余不能詳自廟食以來歴世滋乆能霈澤敷惠以䕃蘇人所謂有禦災捍患之功者伯律出牧於兹天子嘗賜璽書委以重寄而能欽承徳意興利除弊和洽其政人以大治復以餘力修葺神祠徼兹福祉以惠其民可謂能盡事神治人之職矣二者皆不可不書也余故表著之以為蘇人告且俾後之繼守於是者讀斯文尚求如伯律之舉於其政哉重修范文正公忠烈廟記王直正統八年十一月蘇州府重修范文正公忠烈廟成其十一世孫都察院照磨子易具事始末屬直為之記盖公蘇人也曽祖徐國公祖唐國公考周國公皆葬蘇之天平山公嘗請於朝改天平山白雲菴為白雲禪寺世度僧守焉作祠於寺之右以奉祀事至公之子孫又作祠於是祠之南以祀公然忠烈之名未有也宋自元昊反西鄙騷動師出無功仁宗乃命公經畧公選將練兵築城寨墾屯田據其要害示以形勢招徠屬羌恩信大洽决策取横山復靈武元昊勢屈乃請降西人仰公之徳服公之化皆為公置生祠公薨相與哭於祠下者累日不絶宣和間宇文虚中為慶帥言公忠於朝廷功烈顯於西土至今猶廟祀益䖍然廟未有額徽宗命以忠烈名之且為題其榜凡廟之在西者皆易以新名然蘇猶未有也紹興以來西土皆䧟忠烈之廟越在異邦蘇之守今與其士大夫謀曰蘇公故郡也而天平山則公祠墳在焉公之精神必往來乎此乃更作新廟掲忠烈之榜於廟門由是蘇始有忠烈廟每嵗上已郡縣長吏率其屬致祭嵗乆廟壊元至元乙酉嗣孫邦瑞士貴復新之末世兵亂燬焉踰八十年未有能復之者至是工部侍郎廬陵周公忱廵撫至於蘇而監察御史夀光劉君甄武昌劉君仕昌錢塘鄭君顒皆以事蒞焉郡守李侯從智來㑹政事之暇語及兹廟因相與嘆曰公之徳業著於當時傳於天下後世不繋乎廟之有無也然表先正以儀來今使後生小子得聸其廟貌想其精忠偉烈而興企慕之心則廟亦不可無也乃各出貲俾吳縣令永嘉葉錫圗其成錫毅然以身任之殫心盡力規畫處置凡隣邑之令佐皆以貲來助市良材命衆工為堂前後各三間以奉公及三世先公像東西廂如其數以藏祭器而齋宿寓焉壯麗嚴整有加於昔中作石橋橋南左右為碑亭前作大門榜曰勅賜范文正公忠烈廟經始於是年九月九日閲兩月而廟成直聞之士之能任天下之重者必以天下為心心之欣戚主乎人而不私於已是以天下為心者也以天下為心則人庻乎有濟矣初公未顯時已欲任天下之重嘗曰士當先天下之憂而憂後天下之樂而樂夫憂人之憂而欲免其憂使人皆樂然後與之同其樂此豈小丈夫然哉孟子曰禹思天下有溺者猶已溺之稷思天下有饑者猶已饑之公之心猶是也故其徳業之盛不愧乎古人豈特著於西土也哉嗚呼士不以天下之重自任者多矣不以天下之重自任則其所存所行一主於為己人之利害不少槩於其心而又悻悻然自以為得功烈之卑無足怪也而所為士者固當為是邪然則公之孫興邦之人士及四方之來者拜公之廟慕公之功業必當師公之心充之以仁義而力行之於公其殆庻幾乎故為之記而道愚之所聞使刻諸石告焉凡以貲來助者其姓氏皆載之碑隂晉大將軍右司馬陸士龍祠記徐有貞蘇長洲益地鄉厚生里有祠祠晉大將軍右司馬陸士龍之神祠乆廢近里士沈隠君貞吉以已貲興之既落成隠君具顛末徴予記之士龍雲也雲與其兄機士衡並生於吳而仕於晉以文章顯辟為公府掾遷太子舎人出補浚儀令政稱神明去官百姓追思之為立祠於社尋拜吳王晏郎中令一以忠誠輔導之雲愛才好士多所貢逹嘗薦衛將軍舎人同郡張贍時論韙之入為尚書郎侍御史太子中舎人中書侍郎成都王穎表為清河内史穎將討齊王冏以雲為前鋒都督㑹冏誅轉大將軍右司馬因督粮過吳婁地見嵗祲以所督粮儲盡賑飢民忤成都王穎穎將殺之而孟玖素忿怨於雲由是雲遂遇害雖死一身能救萬民民感其徳名其塘曰濟民以衣冠葬楊城湖之濱人呼為陸墓村立祠於相城市中至今民祠之不絶士龍家華亭華亭故吳郡古婁地也正今長洲東北維之壤所謂益地鄉厚生里固其在焉矧陸氏自遜與抗為将於吳有功徳遺其鄉國乆矣士龍又以賑貸之祠之宜也古之享天下後世祀者必有大功徳被於人人思慕之而不忘其祀及乎逺盖天地之妙萬物者神也神之為之者氣也是氣也得其靈竒則為偉人况雲為時名臣有文武長才故發而為忠義之業及其遭禍之死人皆悼惜之感之深思之乆祠之不廢豈非出於天理民彞之正也故記之以告來者知所自焉范文正公祠堂重修記張益肆惟我國家敦崇教化尊尚儒賢其於前代良臣誼弼功徳及人而廟祀於郡邑者必命守臣嚴祀事葺祠宇示勸之意不既深乎顧在守臣之賢乃克視此為重而盡心焉蘇郡實宋太師魏國文正范公桑梓之里而其先隴義莊義宅義田義學咸在故公之祠堂乆建於此事詳舊刻西江况侯伯律以奉政大夫禮部郎中奉勑來守兹郡政敷民安百廢並舉嘗有事於祠下顧瞻棟宇有圯撓者因喟然曰兹責在我弗急所圗曷稱上意即請於朝用加修治於是卜日鳩工度材築基撤舊易新拓小以大為祠堂前後各五楹後以奉公神像前置累朝碑刻東西有廊廡東祠宋郡守潛公咸淳中始建是祠者也堂東偏為書院購用舊材尚堅好也院亦有堂前後各三楹揭以忠厚舊扁東西有廡齋宿閲牲以及庖湢莫不有所其西偏則范氏家廟嵗寒堂在焉子孫嵗祀公父子於其中外為門屋三間亦仍以文正書院舊額揭之垣墉周繚規制宏壯視昔有加凡所用度一皆出粟之羨貯於官者經始於宣徳甲寅六月三日畢工於九月十日况侯謹率僚屬暨學官諸生合范氏子孫以落其成主奉元理及提管希賓爰與族人謀曰祠宇再新既賴郡守盍礱石鐫辭用著不忘遂以屬余余忝為公郡人於斯盛事在所當述故不敢辭以蕪陋惟公間氣所生心與學術俱正毅然有為於世奈何周旋中外政府方登讒慝已搆雖其才不盡展乃若功徳之及人者尚多節義足以厲俗進退綽綽非古之所謂大臣者何能與於此乎當時使能盡用必將成就大業以濟天下此盖君子所深惜也然而公之自立於天地間者百世不泯祠當百世愈新况侯為郡賢守克承上意亟致修治宜乎在郡多善政也詩云伐柯伐柯其則不逺斯之謂歟故余特為之書重建范文正公祠堂記徐有貞宋有天下三百載視漢唐疆域之廣不及而人才之盛過之此宋之所以為宋者也盖自太祖而後十有五君君徳莫盛於仁宗前後輔政之臣幾百數十人人才亦莫盛於仁宗之朝就仁宗朝之人才論之盖莫盛於范文正公公之為人剛大清純天資忠孝而為學得聖賢之心庶乎所謂極髙明而道中庸者故其為臣表裏一誠始終一正而文武經緯備焉公事仁宗自祕閣登諫垣出入侍從守郡帥邊多所渉歴而不得乆處於朝及參大政方將拯時復古權倖間之曽不朞月而去凡所建明旋亦更革公之所存十不施其四五然而勲業徳望之盛視彼乆於其位者猶倍蓰焉使其乆且盡施則宋之為宋當不止是矣於乎甚矣直道之難行也有君如仁宗有臣如文正公其猶若此此有志於世者所深惜也公之同時名臣莫如韓魏公富鄭公魏公於公每事推重而鄭公因事感嘆至擬公於聖異時大儒莫如朱文公文公謂公傑出之才為天下第一流而吳澂氏亦謂公為百代殊絶人物之數公者豈無所見而言哉是以後之君子聞風而起者未嘗不稱公之為盛也凡公所嘗過化之地皆有祠吳中公之故鄉而文正書院故義莊也其祀事自宋元國朝列於常典春秋享之而其祠宇因故嵗寒堂為之屢毁屢葺規制未宏廼者今大司冦萬安劉公孜以都憲奉璽書廵撫南圻而臨是邦因謁公祠瞻顧興懐爰諮所司撤舊為新闢而宏焉協議以賛其圗者前郡守黄巖林侯一鶚今郡守瓊臺邢侯克寛承命以董其功者吳邑主簿南昌李榮也於是公之十二世孫主奉祠事從規來以記請有貞聞之君子之於道也其有所立也必有所宗也求乎今而不足則尚友乎古之人所謂世異而道同者也今夫都憲公之廵撫於斯也猶文正之經制於陜右河東也兩郡侯之繼守於斯也亦猶文正之為治於蘇潤饒越也事文正之事也心文正之心也是亦文正而已矣然則三君子之於公豈非所謂世異而道同者歟有貞於公幸為鄉之後學固嘗寤寐乎公而思所企及者其能自己乎哉雖不文也願執筆焉附名於三君子之後以庻幾夫髙山景行之意云新遷范文正公祠記黎擴蘇州府學有宋大賢范文正公祠者盖以公嘗典鄉郡割所得錢氏南園之地建學而立之也祠及公之子忠宣恭獻者以其復割南園之地益廣其基而入之也祠舊在大成殿之後入路迂曲落地隂潤每經一雨草輙侵階以致朔望之晨行香掲䖍人跡罕至習為故常今太守四明姚公堂治蘇之明年政通人和田榖大登乃歎曰文正父子建學之功如此其大而其祠屋之地如此其僻可能報其功之萬一乎於是相址於二門之内泮池之南入道之右厥位面陽厥土燥剛鳩工築基卜日遷於其上棟楹梁桷之腐黒者易之盖瓦級磚之破缺者補之増以藻飾繚以垣牆書以題扁中塑公像傍列子神儼然一家之氣象也思昔范文正公為當時第一流人物忠義滿朝廷功名滿天下事業滿邊陲在他邦異域者尚欲效其為人况生於其鄉者乎凡育材於兹學者將以供君上致治之用也必目有所接則心有所動矣而我太守姚公既遷公祠於兹而在學之士出入徃來無有不在其目目既有見心可得無動乎必思他日學成材就出為時用以文正父子上義下利之心如此可不則而效之乎以文正出將入相之才如此可不企而及之乎以文正先憂後樂之志如此可不力而行之乎效慕於幼學之時致用於壯行之日俾蘇學之人才益盛而益揚者實由乎一遷祠之所致也然則姚公興學作人之功庸有既乎用是勒兹於石以示來者宋衛文節公祠堂碑沈魯朝廷崇禮先賢累下詔所在有司以時修葺祠宇除墓道使人守䕶如法崑山縣儒學教諭臣劉衡訓導臣章經奏故宋太師秦國文節公衛涇生於是縣之石浦蚤負經世之學魁多士於淳熙甲辰登要樞參大政中外歴任四十年所言皆經國逺謀闗係世教為甚重自文正范公後繼先憂後樂之志者此其人也方韓平原之勢熖熏灼毁譽舛迕今年朱元晦斥明年趙汝愚薨而偽學之禁日迫正士接跡逺引猶排擊無所容其身而惟重利禄輕行檢者附麗以成其私攘臂僥倖於一時而無以為善後之計公以理亂安危之機間不容穟具疏利害請除之而侂胄師旦為世大戮矣尤務搜賢才以立國長養振作以固不拔之基講求大計規恢逺圗而復見扼於彌逺之擅國卒無以售所言夙與元晦有契分至是乞召還而元晦已卒復移文新安梓行所註書又請為右文殿修譔張栻賜謚於今三百年為士者皆能言之而舊祠在馬鞍山荒凉揺落神弗寜妥民有以義起者為徙置學宫之傍俾七世孫烚居守其墓在湖州者亦已蕪没不治臣衡等稽諸禮典法施於民則祀之夫立朝正色不忘規諫名誼所在急於飢渇故能克殄兇憝成謀而不居其功志雪讐恥自奮以厲不剉之氣其於君臣父子夫婦之大倫至言懇切惻怛忠厚而體國之誠根於天性鄉之先逹為法後進如此而嵗事不修祀典有缺使士大夫何以為風厲而世道無所取衷焉乞量為定立時祭則象方來庶不負明詔崇禮之盛意上可其奏命禮部參酌儀注嵗時祀以牲奠帛為三獻禮而祠墓彼此咸為嚴禁約毋有所毁本部右侍郎葉盛與公同里嘗集公遺事得其出處大節而世逺湮没者不能具載知縣唐素主簿胡欽為勸説協規之士買田數十畆以助修葺費而烚得永為世業俾魯撰詞刻石以示逺於乎天之生才必資於世用用違其才則無以自見於世而論者謂南士懦緩不及北之剛毅慷慨多大畧是以吳楚之國常不競於中原此非定論也金源氏之方興以回山倒海之力見屈於宗忠簡公之孤軍無援而斂戢不敢南下者累年李忠定公處區天下事規模措置再踰月而畢舉勍敵為之震懾使二公終用而得盡其才將海内豪傑惕息聴命之不暇大功之成夫誰能居其右者而謂閩越南産迂儒僻士果無能為耶金源既衰北鄙多故宋雖偏安而才武雄畧之士下扞牧圉者甚衆使公柄用而得與戮力必能集衆謀申警備厲鋭養威以作南士之氣使無忘北鄉觀形勢而决事機進可以得志退不失乎自彊假以嵗月則大讐可復而宋室可興矣夫何髙材見疎寡謀自用而勤不相時舉天下於一擲卒之敗衂之餘沒世不振雖公之明見不爽悉如平時所料而才不盡用所可見者如此而已於乎天乎是曷故哉於其祀作歌以侑神歌曰山蒼蒼兮海茫茫懐故都兮天一方中原在逺兮不可望事往人異兮而我心徬徨嗟直行以自遂兮恥徇時而為否臧苟校功資之得䘮兮夫孰畏乎名徳之弗昌𤣥雲兮翺翔靈風肅兮來景光廪有食兮食有堂嵗事羞我兮我其來享時驟集而不可乆兮吾將返飈輪於帝鄉韓蘄王廟記張習一人之忠義一代之忠義也千古之忠義也忠義本於心人同是心者同是好也烏有彼此乆暫之異哉我朝列聖發徳音一則曰忠臣一則曰義士毎令臣下舉以褒崇之不以古今而間者恩至渥也曩蘇郡守鄱陽丘侯霽以宋名將忠武韓蘄王上聞謂王當靖康建炎間屢立戰功捍衛王室維時駐蹕臨安而三吳實在畿内民獲脱虎口而弗致肝腦塗地者惟王倚賴也王後薨葬於吳基存靈巖山西麓止剰一穹碑而荒涼殊甚雖有裔孫居其傍微若一綫時享恒闕據禮凡有勞以衛民者於法當祭矧民至今感之兹臣欲每嵗官為一祭所以酬其勞而慰夫民用塞明詔惓惓激厲忠義之盛意敢請制曰可命大宗伯下有司以行事然而祭無常所或借山寺或在城結茇而祭如是者三十稔矣今太守新蔡曹侯鳯惻然於懐以為事神報功吾民牧分内事也擬於王墓立廟以為栖神常祭之所兼得洒掃松楸免為狸兎草莽之塲乃白於廵按侍御安成劉公丙欣然允俞遂委郡貳守吳川林侯廷瓛董其事侯相攸得舒坦之地於冢南為構正堂四楹奉神主前堂四楹列祭儀有寢以安庻職之齋宿有廡以處百工之庖宰繚以周垣闢以儀門甍枅丹堊孔曼且碩侯用心良宻矣經始於𢎞治戊午如月丁丑至仲秋之腓落其成於是郡之士庻靡不相慶幸以為得順其所望也爰授習志諸石嘗諗王諱世忠字良臣陜右延安人也風骨偉岸目瞬如電蚤抱忠義見國歩艱險即躍然應募而起始攻夏城斬闗而入斷敵將首擲之埤下掃平南北羣盗既而徽欽北狩高宗渡南而趙氏偏安金源雄長神器殆非宋有王於是時以數千殘卒與金人四十萬衆小戰百餘大戰數十自黄天蕩剉之北遁誓蹙金人而滅之克復中原迎回二帝以竭其忠義志氣而後已奈何主蔽奸相弗圗周漢之中興忘讐忍恥自甘瘡痍其生民棄捐其土地使智勇元勲置而弗用齟齬偃蹇徒老而斃所謂自壊爾萬里長城惜哉豈惟王之不幸實宋之不幸也吁以一人之身為國家之用否而繋天下之安危可見忠義之在斯人與天地之元氣相為周流日月同其光明山川同其流峙草木昆蟲同其生息暢逹有不可掩焉者故前後大夫不私於吾郡而揚於大廷襮之天下聖天子於前代之忠義錫之寵光載之祀典俾三百年之隠伏焕然一新於今日由是垂衍千萬世而弗泯曠蕩之恩為何如哉王之行實備載本傳習何人耶敢爾加喙然誠蘇之齊民同一感仰於王者故忘其膚謭謹述如右仍贅詩以道王之功頌朝之恩為迎享送神三章當祭俾歌以侑爵云詩曰延綏山川秀鍾于王英雄慷慨忠義滿腔出為國家掃除秕穅挺身百戰劔弗剉鋩攙搶既滅强禦亦亡志矢北定以迎二王以克上京以復舊疆垂四百年汗青有光煌煌天朝褒揚元勲前代忠義命祀守臣廟建于墳秋嘗用伸牲牡廣腯豆籩旅陳清酤黄流苾苾芬芬灌鬯逹泉燔蕭于旻八音和鳴百職駿奔肅肅恂恂致享厥神神既格思吉蠲饗饎赤駵朱軧矟㦸旄麾左右鞬櫜騶從導隨珮琚颯然可接令儀歆畢言旋抑何所之亦惟在兹體物不遺答我聖恩貽我民禧百嵗千秋式遵定規微顯感通允慰慕斯周孝子廟之記吳寛姑蘇城東南隅有周孝子廟廟始建於常熟在宋乾道間邑人周容奉母朱氏有至行人稱周孝子且勇於為義見罹患難者拯救之恒恐後既沒一日降於其家以已為神告其母且曰兒願為國效力以保䕶鄉閭後果如其言終嵗民無菑患遂相與廟事之其後淮南大疫云有往施紫蘇湯者全活甚衆淮人渡江酬之偶見廟貌始知為神事傳民間凡病者禱訖汲井投紫蘇煎飲即差既七十餘年進士趙必鉘等因具其事又以除蝗驅虎救水旱捍冦盗等顯迹數條上於官朝廷特賜廟額曰靈惠實淳祐十二年二月也歴元至國朝秩於祀典縣長吏率僚屬嵗一祭之不廢若蘇城有廟嵗月已逺莫能考其創建之由豈常熟為蘇屬邑蘇人亦冀其神靈波及郡中以事之歟而近自景泰甲戌嵗吳中大雪民飢而疫作相枕藉死禱者取水煎飲如法亦多獲生民益神之自是凡有所求争趨廟下每旦庭廡如市顧其廟既卑隘禱者益多至無所容足旁有王英者自其父謙以來再世守廟以精勤稱謀欲改建而不敢專其事則與里正李忠周玘輩言於縣於府既如所請且下帖文俾英專守勿懈於是募財於衆一時施予者踵接而蘇衛千户陳俊等更割地以廣其址乃以成化九年十月興工又明年廟成廟故西向始易以南爽塏端整有堂有室有垣有門覆井有亭焚楮有罏以至象設器用亦無不備他日郡人嘗徳於神者相率言其事可記英遂礱石乞予書之自昔吳越多淫祀唐狄梁公按行江南悉㡿去之所不去者夏禹泰伯季札伍員四廟而已君子盖深與乎斯舉然祭法謂法施於民以死勤事以勞定國能禦大菑能捍大患者則有祀今孝子為人雖非若古人之法施於民也然使里之悖逆者聞其風則愧而改行雖非若古人之能禦大菑捍大患也然使里之疾沴者感其靈則安而獲福廟而事之豈不宜哉噫梁公既往吳俗益甚其尤可嘆者家自為廟祀非其鬼人小有疾則指以為祟往往殺羊豕以大享之其歌謳歡笑俯仰跪起類乎生人之燕而卜筮巫祝之徒假以獲利者皆是曽謂孝子肯享其祀乎而人亦敢以其祀祀孝子乎予嘉孝子有補於世教也有益於民命也有合於祀典也於廟之成不能已於記來鶴樓合祠碑彭韶姑蘇來鶴樓在鶴山書院内初蜀魏文靖公為宋名儒登宰執後家平江元世立書院祠之置學官弟子員肄業其中國朝例罷生徒而書院猶存文靖公神主在焉永樂以來凡遣大臣行視水利禁治豪右廵撫地方皆居院以治事屢加修葺宣徳正統間廵撫尚書周文襄公往來居之最乆將稀年時又到到之日適其誕辰有雙鶴來翔於庭衆咸異之既去蘇守朱勝為建來鶴樓於是院正堂之後遷置神主於上未幾公致仕歸而沒今三十餘年矣東南人念公功徳不置多立祠間寓僧寺獨蘇城無之况公之功於蘇尤大安可無也盖公二十年間總核荒蕪田糧創立水次倉庾囤户田甲義役傳馬官俸折徴餘米存積凡糧運加減之則濟農斂散之宜種種便民者俱自公權輿而於蘇始焉至於清理范氏義田經畫崇明塗蕩濬吳淞顧浦一帶水利建寳帶吳江等處橋堤太鎮衛學之肇造吳縣儒宫之改遷似此之屬又皆於蘇專焉奈之何僅肖像學舎而不他有也書院雖為鶴山而設來鶴則為公建文靖公固可專祠文襄公亦可合祠也盖文靖公之道學可法於後世而文襄公之事功最盛於吳中合祠於蘇不亦宜乎成化甲辰秋余忝繼廵撫是邦處於書院瞻拜文靖公神主於樓中而環視樓下石刻皆頌美文襄公事然無其主意前人謂來鶴為公而樓足以顯名於無窮惡用主為噫此非所以敬賢尚功之禮且無以慰邦人之思也越明年夏詢知公功之詳於是令太守李廷美造公神主擇日奉置於樓與文靖公並偶余赴召未能成禮遂俾守卒事又繋辭於碑曰惟宋之季卭實有儒道徳問學與西山俱叅樞開督萋其毁譽乃卷而懐卒家於吳爰暨似續顯揚是圗元乞立學比迹鵝湖師生濟濟以景賢模我明更制冗泛其祛依神之木尚仍于初鶴山有堂制使來居文襄戾止視民卒瘏晨夕在念如切肌膚公資明敏公性勤劬畫堂晝訪粉盤夜書待旦行之子惠我蘇荒疇招佃免爾負逋米石加耗五六平輸石四准直二十四銖料減賦長無俾侵漁謹權審量互収調區一孔一目不漏不疏里甲十年差次運夫環復而均貧富樂趨鱗鱗水次倉積山如京運漕兊贈加有餘乃置濟農以備不虞驛𫝊有給義役有須織造上供嵗派軍需胥此焉出别無科敷公簡儀衛徑造閻閭問民疾苦甔石何儲發廪賑之野無餓莩海縣流沙淤為蕩塗經畫分授抵補坍租贍族義田先正之謨載清𫝊付俾後畢哺乃遷吳學或剏或郛省元掄魁接武天衢吳淞顧浦泄彼太湖乃濬乃鑿民免其魚寳帶湖堤病渉﨑嶇乃甃乃築人走坦途二十餘年恩布仁舒非無凶嵗我有儲胥非無祁寒我有袴檽軍民給足逺邇歡娛間有煩言乆而益孚雙鶴翔庭適公懸弧僉曰異哉兹其瑞乎眉夀之徴進禄之符鼎建來鶴樓于北隅公歸在朝首拜司徒辭掌邦土惟帝曰都南圻再撫敢忘捐軀臣年及矣幸賜懸車胡歸三載弔者在廬吳人思公至今不渝窮鄉尸祝㑹城曷無瞻彼鶴山來鶴相於徳業雖異㑹歸不殊百世之下兩其師諸二卿祠堂記夏時正國家仁愛小民在安之已矣亦既屬之内外羣司而猶慮夫府州縣有不職則民有不安也乃時輟在廷大臣出廵撫焉維廵橅有地環數千里其地即府州縣之地民即府州縣之民廵撫髙臨府州縣之上凡軍務民情咸得便宜處置以振拯夫府州縣之所不逮發政施仁黜貪去暴簡修進良剔腐蠧補罅漏持欹傾燭幽隠凡可以嫗哺而袵席之者無所不致其極也以是上宣徳意下逹民情以是對揚天子休命慰答人民願望生則民愛戴之歌頌之去則思思不忘也沒則祠而尸祝焉不亦宜乎工部尚書周文襄公宣徳正統中以工侍廵撫南畿謂廵撫事在安静不擾民自安矣大江迤南南畿若府州縣皆吾地也而蘇松常三府税糧淵藪國家之所倚重人民物産官府百凡科率視他或相倍蓰或相千百又前此統紀不一征斂無藝費出無經民病法苛田蕪逋租積數十盈萬民力竭矣足國云何故於三府尤注意焉下令置水次倉秋糧不許糧長私家収受一切詣倉抵石輸官起運存留外之贏次名曰餘米一嵗中若急副和買顧募徭役土木經營之類事起一時胥此焉出若馬草夏税軍需嵗造鹽鈔之類雖有常額亦此出焉外仍餘者耕補斂助歉儉賑貸恤孤養老均施溥被之也何公心計周宻如此至到也邪自是居安逃復愁化詠歌逋負有償宿蠧呈露志漁獵者無地售其巧善夤縁者無路投其技閭無胥𨽻之跡户絶鼗柝之召鷄豚蕃息麻糓被野嵗復連熟米斗錢十七八文或十四五文稀曠僅有者乎如是十有七年還朝陞尚書復來又一年致仕歸民思之歌頌之猶洋洋也詩曰有斐君子終不可諠兮此之謂歟嗣公之賢則有南京吏部尚書崔莊敏公天順中以都察院副都御史來其地前日周文襄公之地其民前日之民有其地有其民得其道得其心文襄公心在安民得其心斯得民矣民之愛戴之不猶愛戴文襄公乎崔公於文襄也無所於改而持之特嚴然政由俗革偏滯頺靡整飭疏滌時措之宜乃相成以安民非相軋也是以貧厄在所惠鮮則均徭之法立財貨宜所慎出則漕運之費節鑿常鎮一帶運河免孟瀆下港逺渉風濤導吳松等江下流洩震澤苕霅夏秋汎溢獄有疑濫毎與平反崑山縣王阿隆充太倉衛軍死無子里中揭黄冊丁盡户絶報無勾矣它日其同姓亡賴子利阿隆有舊田廬衛且去其家近是不出家充軍月得食官廪乃用自誣為阿隆近親先避軍移貫在它户言於清理軍伍御史信之遂逮里中論以隠匿坐充軍者二十四人而二十四人列狀訴伍御史於崔公崔公閲其狀非不根且謂律罪人首實則連坐當末減又中更大赦全坐非律意乃移檄御史愎不省崔公曰凡在吾廵撫皆吾民有不幸猶將隠之况充軍乎况二十四人乎竟直此二十四人一旦脱去軍幡然復歸於民逺近莫不大快慊御史自後遇隠匿者猶與論減不充軍人謂由崔公有以覺悟之也在南畿凡五年還朝歴陞吏部尚書改南京致仕歸當崔公昭雪二十四人時今浙江叅政崑山陸公容之父封職方郎中公名在二十四人中叅政公尚未升作雪寃頌頌崔公而職方公欲為立生祠屬制令不可止而此心則縣縣往來不置也適慈谿楊侯子器以進士授知崑山勤慎有立志期月政通民悦繼養以教乃攷民風按地圗得境中淫祠與庵院私創者悉毁無遺留而移其材為公廨賓館郵傳申明旌善亭鄉賢祠社學脩建需縣東去一舎而近太倉鎮海兩衛在焉有三官閣者亦在所當毁叅政公言於楊侯周文襄公崔莊敏公嘉惠吾人吾人一日䝉其澤吾人一日甘棠之思也盍釋是屋不之毁改以祠二公永副吾人勿翦勿伐之詠乎楊侯諾之乃獨水火其土木偶而綢繆其牖户汛潔其醜穢正其唐塗飭其漶漫黯黟斥其非度者琢美木為二公之主題曰工部尚書周文襄公之神南京吏部尚書崔莊敏公之神扁其屋之顔曰二卿祠堂而奉安之祀以少牢酒清殽腆神之格思逺近來觀贊嘆悦懌謳吟而退於是參政公手述二公遺惠蘇人者之畧來徴為祠堂記辭不獲廼記之曰惟昔臯陶陳謨在知人在安民安民則惠黎民懐之二公恵在蘇民民懐之深也故於祠堂之建其悦之也亦深一誠相孚思之乆而不忘者乎是舉也參政公實啟之而楊侯克成之因民心之不忘用以不忘二公是即所以不忘乎民後之繼之知不忘乎民則必不忘二公則此祠堂之建有永其無斁乎周文襄公名忱吉水人崔莊敏公名恭廣宗人謹記宋太師鶴山先生文靖魏公祠堂碑楊循吉𢎞治嵗己未之夏六月詔祀宋大儒鶴山先生文靖魏公於蘇從所請也先生本蜀之蒲江人蘇得祀者先朝賜第與其墓在焉於時中順大夫知蘇州府事河南曹侯實承上命卜以是年秋吉修事於書院惟謹既而以為先生遭遇明天子得發揚其道光於無窮徳意甚盛不可以弗志乃屬愚俾書之石愚按先生諱了翁字華父宋慶元五年進士官至資政殿大學士通奉大夫臨卭郡侯加贈太師進秦國公其曰鶴山先生者著書白鶴峯下學者所共稱也先生學以忠信篤敬為工夫踐履既茂用發而宏故能正色立朝則不附韓史立言垂範而羣經以明所謂有本者如是於是當宋之季宰相行僞禁法天下莫敢言道學先生以其所負者起而振之靡然從風士克返正然則程朱以來吾道嘗中微矣至於先生而又為一始斯文之不墜地實有人焉不然抑莫知所紀極也由是言之厥功為大而况有懿徳忠節炳炳乎哉是以皇上發綸音稽太常慨焉以列於禮典而不惜者盖其報宜然也然先生去世且三百載澌融燼寒寂寥無聞而恩命優隆始自今日斯非直以為君子私頌而已國家崇賢禮徳之大於此焉覩而亦世道之所係也歟侯蒞郡以正篤尚名教至是尤以風勵為急加勤惓焉故不敢以淺陋辭顛末既具又為樂歌係其後將請用之獻爵云其辭曰奕奕兮新堂牲醴兮苾芳靈風穆兮綘帷揚皇有命兮神來肅將褒衣兮峩冠有懐兮明徳凛正直兮元氣儼静𤣥兮容色撃彼畫鼓兮吹參差蘭烟焚兮桂漿淋漓神具樂兮匪土之思徘徊國恩兮按雲節而不以倐馳以祐治化兮萬年為期新建鄉社亭記顧清𢎞治甲寅任丘鄺侯為吳縣令始至延見其邑人問邑之名徳若廢闕之當興舉者禮部主事致仕楊君循吉鄉貢進士史君經醫學訓科盛君俌及鄉之父老合辭而言曰故禮部尚書希顔楊先生博綜經史尚古力行在仁廟初以薦起家入翰林為侍從若干年受知列聖預修纂三朝實録大為館閣諸公所敬禮拜郕王府長史陞禮部侍郎方大用公而公遽引年去景皇帝念公之賢進尚書為官其一子為吳縣簿其始終全節見於公自撰墓誌少冢宰文莊葉公之日記甚核為人淳厚而坦夷貞静而直諒非聖賢之書不讀非義理之文不窺孝慈友悌薫於鄉黨考徳詢事無愧古人見於少師東里楊公訓導陳君永之永之序述甚備盖宣徳景泰之間士大夫稱厚徳者莫先焉而殁不數十年垣宇蕩析丘隴弗守雖學宫有祠春秋不廢而閭黨之間聲響殆絶邦人興哀謂徳鮮祐振而興之斯亦表俗明民之一事也侯聞而韙之其明年侯作康履之橋於城西至徳鄉既成以贏材屬義官葉璋度地於其北得信心庵廢宇撤而平之構亭焉榜之曰鄉社取史君所刻白鹿洞規古靈諭俗文列置於左右而先生於其中乃告其人曰古鄉士大夫之賢者殁得祭於社吾其於是焉俎豆公何如皆曰善此吾之志也非侯其孰成之於是以日之良具酒脯殽酹於亭下而作歌曰惟吾有氓侯則喣之惟民之僻侯則矩之民徳是懐侯弗我違我甘我辛侯則具之孰新斯亭侯實我教孰嚴公祠俾我民傚至徳之鄉康履之陌昔為緇廬今也公宅褒徳正回示我民極勑爾婦子告爾隣比侯爾父母公爾師資爾安弗師寜侯忍欺歌竟相與瞻戀徘徊如公復生有感泣者史君曰夫表先賢以勵民大義也興衰振微大惠也咸不可以無紀乃以其事走京師屬予書刻之貞石用告於後來者先生諱翥字仲舉鄺侯名璠字廷瑞與予同癸丑進士云直道陳公祠記沈燾成化二十三年九月今上初即皇帝位詔天下諸司舉廢興墜凡名臣賢士墳墓所在即時修理吾鄉直道陳公之墓増封加飾如制守臣又以公清忠直節備載國志仍具禮奉公神位於郡學鄉賢祠嵗一修祀越𢎞治十年丁巳嫡孫冠以家無専祀懼乎有罰乃謀建祠堂數楹將以揭䖍妥靈謁於天官少宰吳先生先生題其額曰直道陳公祠復請記於燾以刻繋牲之石謹按公諱祚字永錫世家吳邑之南鄉曽祖翠山祖正父子敬能自樹立由南鄉徙居郡城甘節坊以貲雄里中母顧氏有懿行生四子公居次自幼不羣篤學尚氣節治春秋補郡庠生永樂五年以楷書選至京六年應天府鄉試中式七年中禮部㑹試九年殿試賜進士出身尋改庻吉士入翰林明年上拔公河南布政司叅議為政持大體多惠愛於民十二年言事坐謫太和佃户者十年洪熙初被薦復起宣宗皇帝即位勑所司覆試之公皆擢第一除山西道監察御史彈劾無所避權倖斂迹宣徳二年出按福建六年出按江西所至威望並著嘗以大學衍義勸上經筵講説上震怒勅提至京師並籍其家屬繋獄幾五年英宗皇帝嗣位復其官家屬盡赦之正統三年出按湖廣發遼王不法事上怒徴繋論死後以王罪廢見原改雲南道六年廵視江上盗賊屏息商旅便之八年陞福建按察司僉事激揚有方一道清肅十三年移疾家居乆之乃具疏乞歸得報即行囊無長物晚號退翁杜門簡出所著有小學辨惑夫公以清才正學雅性忠義數以直言遭貶黜而志不少挫信為吾鄉先望卒之後䝉恩詔登國志列賢祠宜也一時慕公之風而興起焉者遺像有贊入祠有牘石刻有誌有表有記藏於家有𫝊有狀有録與夫哀有詞輓有詩固足以發揚公之盛徳無容喙矣燾念自齠齔時聞鄉人誦公之言行毎為之拊髀興嘆於冠之請敢不勉從是堂之作始於是年正月二十九日集材鳩工衆力齊事踰時棟宇翬飛青堊炳焕其規制悉如五品之式中為一龕以奉僉事公像又為别室四龕以祀髙祖誠齋府君次曽祖即僉事府君次大父教授府君次考存齋府君其曽祖之龕是將親盡不遷而為陳氏之始祖也四月六日工告訖功冠乃備物具服率宗人祭之又垂顯刻以示乆逺可謂孝矣因系之以詞其詞曰陳實舜後維世逺哉傳徳襲訓踵生多才山川效靈刄發于硎公直如矢為世典刑三黜以言秉志不易朝奏暮疏功維社稷生榮死哀登志入祠宜建影堂維靈居之由髙及曽同堂異置若祖若考爰述爰繼時有明薦孝孫惟寅以延百祀無忝神明石湖鄉賢祠記莫旦石湖鄉賢祠祠石湖之鄉賢也始漁陽史君俊之為吳縣也一日觀民風出郊至湖上見穹碑立草莽中上有石湖二大字御寳燦然詢之乃知宋孝宗賜范文穆公成大之宸翰也有亭曰御書廢亦乆矣君慨然太息乃出俸金而作新之一仍其舊既落成而君遷秩以去今任丘鄺君璠以名進士來繼其職暇日與僚屬登亭四顧以為山水滿前景物如畫殆與西湖畧同惜不及西湖之有鄉賢祠耳今文穆亦鄉賢也豈不可即是而祠之耶於是考諸郡志詢之故老自文穆以來士之出於石湖者得二十三人或以科第發身或以材諝薦舉或以髙潔見重而其道徳功言皆足以師表百世而無間然者也遂凖式為主序其時世先後書其爵諡姓名即御書碑後而奉安之題曰石湖鄉賢祠即古者祭鄉先生於社之意也於是醫學正科邑人盛俌來請旦曰俌與君皆鄉賢子孫也史鄺二君作興之功如此事不可以無紀乃伐石為碑而以紀文見屬竊惟石湖為吾蘇勝景當吳縣吳江二邑之交山川清淑之氣鍾而為人者豈止二十有三而已哉然二十三人者逺或數十世近或百餘年其骨已朽何以得後人之尊崇企慕如此哉夫然後知大丈夫之為人生不徒生死不徒死所謂道徳功言師表百世足以美教化而厚風俗也不然彼丁謂亦石湖人也而真宗亦有宸翰之賜以世則在諸賢之先以爵則位諸賢之上今乃不獲與諸賢之列者何哉後之人陟降仰瞻可以悠然思惕然懼而思齊内省之心自不能不感發而懲創矣大尹君表先哲以勵後進其功豈小補哉是為記若夫諸賢之出處行實則載於石湖志云重修山川壇記浦應祥祀事國之重典也禮天子祭天地諸侯祭山川卿大夫祭五祀士庻人祭先祖名分各有攸係而其齋祓對越之誠敷逹精明之徳盖不以大小而有異也然則祀事豈可苟忽乎哉吾蘇古名郡而封内山川𨽻在吳邑𢎞治辛酉春郡伯曹公將有事於兹而邑宰任丘鄺侯先事而徃隨事整飭之餘復瞻顧揣度曰有事則為謁欵之地過事則為草莽之區非所以敬鬼神崇國典亦非所以為國經逺之圗也爰請命於公而増葺之公是其請用是量土地計徒庸開闢方隅補益坎䧟礱石而為壇壝甃石而為周垣幽深閴邃廣衍嚴潔齋宿有居庖翟有處髙其門域固其扄鑰丹堊輝映品植森鬱望之而知重祀之所在也工畢合邑之士與夫知禮之氓咸曰侯之功施於位者溥矣然不能以悉書而備録之也此而不記將何以昭侯之休嘉於永乆哉胥命予文之以鑱於石予隣侯之治辱侯之愛稔知侯之為人侯以名進士出知是邑抱明敏便捷之才濟閎肆辯博之學而施之以寛嚴威惠之政六職克舉而發擿奸伏有若鑑燭誠所謂赫赫師尹也其於民隠凋瘵則又深於究理所謂豈弟君子侯實兼焉今六年於兹矣監司知侯之賢上疏而旌别其異能者凡三而侯益勤於政盖其勵志堅操邁名而顧行者觀其所為有足徴矣更於其平日政事之餘掉鞅藝塲游刃詞林殆所謂有乎内而能飾乎外非焚梓毁璞者比也侯超擢有日此畧記其名行之槩俟其它日負荷重任則其豐功偉績當有秉筆者為之傳焉𠡠祀鶴山先生魏文靖公記吳寛𢎞治十一年四月蘇州府長洲縣民魏芳具疏奏臣十世祖了翁宋慶元五年進士累官至資政殿大學士參知政事贈太師秦國公謚文靖嘗講學於臨卭白鶴山下及謫居靖州建鶴山書院以居學者後在政府理宗親題書院扁以賜仍賜居第於蘇州以疾命就醫郡中及卒遂葬城西髙景山下後以居第為書院而墳墓至今有碑在焉惟公立朝大節及講明道學之功當時與真文忠公相上下故人以真魏並稱國朝既以文忠公從祀孔子而范文正公蘇人也亦有文正書院又以公有功於宋亦命守臣即書院嵗時致祭顧獨遺公徒使書院巋然神位虚設實為缺典兹幸遭際聖明崇儒重道屢降明詔表章先賢脩舉廢墜如念公之功特賜秩之祀典豈惟為魏氏之榮而已所以慰吳中士大夫之望者在是盖芳之自陳如此事下禮部議以公平生具載史傳考論其功於法得祀宜勑守臣春秋舉行如范文正公故事覆奏從之芳感激乃謁予告曰聖朝盛典一旦光賁於斯文至矣幸載之文詞以示後世寛謝不能而其意益懇盖公居第實在蘇城之南元至順初公之孫起欲以其地規為書院言於侍臣以逹於上得以舊扁揭於堂楣而學士虞公且為之記公之功至是始顯然觀記之所云一時尊崇之意雖若甚盛亦不過其子孫世奉祀事而已豈若今日由於禮官之所議出於君上之所從陳其牲醴奉其幣帛内出祝詞俾有司奠讀如儀有國朝之盛者公之功至是益顯豈前代之可擬哉抑公之仕宋當冦亂擾攘蹙於偏安之地忠言沮塞尼於權勢之人其事業既不得大行於時獨其講學之迹見於所著九經要義周禮集説等書有不可泯者故雖百世之下學者猶有賴焉則夫論其功者祀之一郡果足以報之乎盖國初王忠文公子充嘗著從祀孔子議其謂歴代儒先有功於聖道者至宋有周元公而程氏兄弟承之迨朱子集其大成中更學禁獨真魏二公不背其學力以斯道為己任其所著述皆黜異端崇正理質諸聖人而不謬足以纘諸子之緒以為當列於從祀其言合於公道君子取之乆之竟詔文忠公從祀如其議則公固不得而遺之也夫報功之典人當言之非一人所能私者則寛之記此豈亦私於公哉君子將亦有以取之吳中金石新編卷五
