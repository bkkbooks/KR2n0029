body:
  text: 吳中金石新編卷六明陳暐編寺觀虎丘雲巖禪寺修造記楊士竒蘇長洲縣之西北不十里有山曰虎丘吳闔閭所葬處世傳既葬有白虎之異故名岡阜盤欝泉石竒詭盖有王珣及弟珉之别墅咸和二年捐為寺始東西二寺唐㑹昌中合為一而名雲巖者則昉於宋大中祥符間載盧熊郡志如此始清順尊者主此寺至隆禪師而復振歴世變故寺屢壊輙屢有興之洪武甲戌寺復燬永樂初普真主寺始作佛殿寺僧寳林重葺浮圗七級繼普真者宗南作文殊殿十七年良玠繼宗南是年作庖庫作東廡明年作西廡作選佛場又明年作妙莊嚴閣三年落成盖寺至良玠始復完所作閣之功最鉅凡三重崇一百尺有竒廣八十尺有竒深六十尺上奉三世佛及萬佛像中奉觀音大士及諸天像其材之費為鈔三十餘萬貫金石彩繪之費六十餘萬貫又經營作天王殿以次成良玠杭之海昌人原石其字前僧録闡教止菴其師也余聞諸刑部主事陳亢宗云原石嘗從亢宗遊遂因以求余記其成余聞虎丘據蘇之勝嵗時蘇人耆老壯少閒暇而出遊者必之於此士大夫宴餞賓客亦必之於此四方貴人名流之過蘇者必不以事而廢遊於此也然亦有興念夫王氏之嘗樂於此者乎當是時王氏父子兄弟寵禄隆盛光榮赫奕舉一世孰加也而能遺棄所樂輕若脱屣焉者豈獨以為福利之資乎其亦審夫富貴之不可乆處焉與子孫之未必世有者乎雖其智識趨向髙明正大不足以庻幾范希文之為而無所係累乎外物視李文饒溺情役志下至於草木之微者豈不超然過之也而自建寺以來今千餘年雖屢壊而屢興其飛甍傑構凌切雲漢其與山川相輝焕稱名勝於東南愈乆而不衰者固佛之道足以鼔動天下亦必其徒多得瑰瑋踔絶刻厲勤篤材智之人能張大其師之道以致夫多助之力也瑰瑋踔絶刻厲勤篤之人其用意也宏其立志也確有不為為之而孰禦其成哉嗟乎其若是也使就於世用有不立事建功而可以禆當時聞後世哉吾又以慨夫屢見之於彼而鮮遇於此也蘇郡虎丘寺修塔記張益虎丘寺有塔凡七級在絶頂故視他塔特髙始建於隋仁夀九年當其掘地築基得舎利一人聞空中奏樂井之吼者三日虎丘既為蘇之勝地而塔之靈異又若此其來遊者不但欲遂登覽之樂且以致崇信之心焉寺凡屢燬塔固無恙洪武乙亥僧舎不戒於火寺焚延及浮圗永樂初住持法寳重構殿宇而塔則專託寺僧寳林加葺之宣徳癸丑火復作於僧舎浮圗又及於灾而加甚於昔焉住山定公南印慨然歎曰是魔耶數乎不有廢也則何以興人能興其所廢無他在其志之所立何如耳乃罄衣資所有粗具材石既而廵撫侍郎周公郡守况公聞南印之有為也即捐已俸首助之郡人争以財物來施由是材非美者繩墨不加石非堅者礱琢不及經始於正統丁巳之春落成於戊午八月三日露盤初上白鶴數十廻旋塔頂乆之乃去舎利之光連夕燭天既閲月復有紅白之光自塔頂出横亘北斗之下靈異薦彰衆目所覩謂尤盛於塔之初建時也南印又因餘財創構大雄殿丹碧交輝實與塔稱惟前塔之重建也始發心於南印而力之所成就者多出於周况二公之樂施力於此者又因南印梵行内學髙而且深有以動之也南印字味蘖南印號也盖為天界住持蒲室之孫樸菴之子禪𣲖𫝊自臨濟歴吳江之普濟湖之天聖蘇之承天住持今為郡僧綱司都綱僧臘踰七袠矣嘗承召命較藏典於北京海印賜賚便蕃緇素致榮艶焉其徒永端斵石於寺求文以識其師重建是塔之由用示乆逺予嘉南印有志於事而竟成也乃為書之石云勅賜藏經閣記周忱欽惟我朝奄有萬邦聲教所覃地大且逺列聖相承廟謨迭出爰乃叅用真乗助宣皇度廣資福利昭薦國釐故凡神州赤縣必鼎建梵宇増飾莊嚴復有詔校脩大藏經典至是事竣頒勅降經於天下寺之暴著者而蘇之虎丘雲巖禪寺與焉適忱叨䝉上命廵撫京畿賫勅䕶送藏典至於其寺當正統戊辰正月望日也主寺煚師因聚緇衆大啟寳函同音閲誦忱獲拜瞻何幸躬逢勝事見其縹帙之整彩曄而光騰奎畫之妙龍翔而鳯舞猗歟盛哉然則天章𤣥丈之重奚可不庋而珍藏所司以帑廩羨餘度材庀工為層屋五楹髙六十五尺廣九十七尺深如髙函以龕匱設供以几案彫繪金碧靡不堅完於是臣忱謹題曰勅賜藏經之閣閣後煚師復罄衣槖搆一軒以待徃來休息又建香積堂伽藍殿海泉亭相峙殿塔之左右前後可謂得人矣既而師狀附逺來江右蹐門求識其事於石余已衰老獲乞骸骨歸田文思凋落曷足以應其求耶雖然師之勤篤惡能終拒抑予嘗與焉且春秋之法常事不書今天恩如此之被佛典如彼之全誠曠世盛典其可不書矣乎第慙拙訥無以昭示後來姑述梗槩以復之師嘗奉詔内廷校經名煚字照巖林隠其别號也故云天平山白雲禪寺重興碑姚廣孝天下佳山水固有矣必遇乎名公偉人以發其迹然後境益勝而名乃著也興壊理亂措諸事業必賴乎才能智謀有足為者然後見其成效也山水雖佳微名公偉人以發其迹則境之蕪沒而名之昧昧者盖多矣興壊理亂微才能智謀有足為者必不能見其效也非惟不能見其效而反致於顛覆隕墜者徃徃亦多矣故山水事業顯隠成壊在乎其人若汲汲欲求遇於人而人不可必得者或數千百年之間不求而自得者何也盖物之顯隠成壊闗乎氣運屬乎時縁而致然爾豈在有意而為之者哉天平山白雲禪寺剏於唐寳厯間至宋天聖寳諦大師來是山見寺之基構狹劣而不足容廣衆始開拓其塲地以成大刹慶厯中文正范公愛其泉石清麗林園茂宻故奏請為香火院忠宣公繼父之志遴主法席者謀諸蘇長公子瞻遂延致逺録公始革律為禪矣寺之住持非有徳有言者不足以當之故歴代皆名沙門也元末丙午天兵臨吳城寺毁於燹罄無所有但荒烟茂草鞠為狐虺之囿也洪武七年復菴圭師來領是寺復菴乃先住持士瞻標公之大弟子也戒行兼優操略並善故寺衆與文正公子孫謀曰起寺之廢者非復菴不可也於是相率耆彦禮請主之雖寺有恒産而賦役甚劇復菴夙夜酬應弗有勞苦况東序比丘智在左右羽翼支費撙羨以興厥功故大雄之殿方丈之室説法之堂栖禪之所山門廊廡庫庾庖湢鐘魚鼓版之設熏炬𤓰華之供廿年之間無不備具而未嘗持一䟽干一人怳然成此大業若地設天造可謂能事畢矣噫天平泉石之清麗甲於中吳文正公為之主維故境益竒而名益振寺極其廢得復菴為之中興而有以見其成效也以斯論之山水雖佳不遇乎名公偉人則境湮而名昧興壊理亂不賴乎才能智謀有足為者必不能見其成效也審矣今復菴之中興是寺雖經營措集彌嵗弗寜略不見其囏難困苦之狀可謂才能智謀有足為者矣今年秋以書來北平求予述以示其後予吳人也天平乃熟游之地復菴與予友頗厚知寺之興始惟詳故弗讓而為之書乃復繋之以詩曰天平之髙冠于吳山林木茂蒨雲泉潺湲巖巖龍門是為𤣥闗雄虓既伏夭狐寜攀勝妙境界佛刹是宜廼剏于唐寳諦載治堂構靚深緇徒所依偉乎范公朝請主維敬延柴石始習禪儀境益其勝名益其彰靡有碩徳莫據㹸牀歴代繼席皆匪尋常人境俱絶可抗大方粤嵗丙午天兵臨吳欻罹欝攸百毁一無錦繡林園化為丘墟有來游者無不長吁復菴圭師效其才能不廿年間衆廢具興比丘智在乃同厥心左右贊襄其力孔任棟宇蔚而丹碧爛然有物畢備一如其先濟濟真侣安居彌堅寅夕禪修天子萬年萬夀禪寺重構佛殿記宋濂蘇之長洲東北二里萬夀報恩光孝禪寺在内焉初晉義熈中有沙門法愔自西域至中夏與慧逺法師結社廬山已而來蘇以念佛三昧化道有情蘇人翕然歸之為建净夀院梁時更名安國長夀二年又更名長夀尋燬於兵吳越錢氏有國中吳軍節度使錢文奉重作之又更名安國長夀禪院始易禪僧明彦主之宋大中祥符二年丁晉公謂奏改為萬夀崇寜二年始加崇寜於萬夀之上政和初又更名天寜紹興七年復詔更今額為徽宗薦嚴之所元至正末天下大亂寺為兵所燬羣僧散鞠為椔翳之塲國朝洪武癸丑蒲圻魏觀來吳為郡周視廢基蹙頞而言曰是刹之廢不得名浮圗不足以起之行中禪師仁公乃寂照和尚世嫡今住虎丘徳涵道融堪為人天師且兼道儒家經史發為文章嚴簡而有法内外之學雙至中興之責其在是乎遣使者致書幣凡三徃而後應之視其寢室則牀第蔑如也稽其榖粟則盎無斗儲也訊其執役則僕𨽻無有也師泊然獨居若享萬鍾之禄者曽不幾何僧之散者復還逺近清修士魚貫而來有饋食者有供三衣者有施黄白金者禪師曰可矣戒左右重構大雄殿五楹間鑿石於山市材於江陶瓦於郊工者奏技壯者獻力鞠明究曛不督而集四阿有嚴若翬斯飛丹雘絢爛炫人心目僝工於甲寅春二月至乙卯冬十月厥事告成禪師太息曰寺之凡建殿為鉅殿既成門廡堂室當易為耳吾耄矣宜選春秋强盛者繼之禪師乃退居松林蘭若輯舎合輿議延瑩中瓛公瑩中嘗請業禪師不復固辭乃走吳江水月廢刹輦致三世如來像妥奉殿中觀者起敬瓛公晝夜孳孳將次第成禪師之志復來請文以示後之人誠可謂賢也已嗚呼大千界中不離一念建治銷毁隨感而形昔也兹刹付之虐熖化樓觀而為灰燼果誰使之哉此一念也翦翳剔荒變瓦礫而成梵宫又孰為之哉亦一念也善惡之所繋其懸隔有如此者可不慎歟禪師起廢之功無讓於開基瓛公善繼之力必漸復於舊觀皆肇於一念之善者也法社緇衣之士來居於兹尚當擴而充之為聲聞為縁覺為菩提薩埵雖曰等妙是覺亦可拾級而升無有出於此念之外者毋徒委為有漏因果如忽之哉昔有唐僧貫休所畫十六羅漢像頗著靈異吳越時邵思寳等共建二石幢今猶存詩曰牽牛南斗姑胥墟義熈神僧建梵居相傳正受起凡夫以法籠絡為周阹洿泥欲現金芙蕖盛衰相尋雲卷舒嵗幾及千道如初飛樓涌殿薄太虚欝攸毒熖翻赤烏化為灰燼無復餘上􅃒叢棘下夫須白烟斜日寒隼呼虎丘尊者名浮屠見性炯若摩尼珠胸中藏書比石渠應聘而起三嘆吁食無糗糧衣無襦赤立何以興吾廬蕭然一榻結雙趺風聲渢渢撼州閭四方聞者魚貫趨布泉盈槖粟滿車稇載有若神鬼輸成此寳構只須臾龍礎承楹列碔砆榱題攢星塗以朱日月回薄氣扶輿懾慳破執道力驅空中樓閣齊毘盧法筵誰嗣乃其徒利如干將温六瑚吳江有刹委平蕪尚留像變金作膚妙莊嚴相愍且都輦致中座青蓮敷直揭紅日升天衢大綱既挈萬目攄三門夾序暨堂塗勢可馴致當不孤祗今勝槩夐然殊黒白駢首施拜膜鏜鞳如獲聞鐘魚有情弱質同巴且暮枯寜復論朝腴一念揺曵風中􅒅大雄慈憫猶已痡乃假塔廟作世模由外修内垢净除事為不落有與無空空色色皆真如作銘者誰列仙儒鐫之青瑶字縈紆後千百載期不渝重修承天寺記陳繼寺之剏於梁天監初曰重𤣥唐曰廣徳重𤣥宋曰承天後曰能仁元曰承天能仁國朝曰承天歴嵗既深廢而復復而廢者累矣至元間南楚説公主之繼以雪忩明公二公先後為大殿為穹閣為經鐘二樓及諸殿堂皆極宏麗而天下未有與之稱者也然未百年而剥陊傾敗者日甚其為之主恬然視之莫能葺復者已越數輩長其教者恒慮不寜乃謀於衆曰東南大觀而振吾道以為衆之所歸者惟在承天主席既虚弗得其人將何所托僉曰南印定公其可為南楚雪忩後者即舉其住之公淡然若無所為惟勤其道敕其行以善化人而已與之游者薫其仁慈不為殘忍浸其寛裕而黜隘陋茹其誠篤以謝浮薄跡其剛毅用變柔懦故人皆曰定公賢徳而足以翊吾善之為者也咸傾心向之公乃倡於衆曰吾欲使是寺而輪奐之若初也盡出其貲以集工材其樂施占事者源源而至始葺大閣為佛萬數再葺經鐘二樓葺無量觀音二殿而新盤溝殿末理大殿為四天王於三門畫五十三叅於兩廡凡諸貌像而皆飾之旛幢供具處所宜有者無一不具金碧耀日輝煌映發入而睹之者恍然若不知其為人境也其功盛哉然公之志猶未已也徃時南楚雪忩皆為宗門碩徳著聲湖海其相繼事以雄土木之功猶稱不易况公一身而復新其舊者哉前有作者後無繼之其傳不逺公可謂有功於二公者矣可謂不孤其所知者矣公溧陽人也姓李氏生六嵗聞長者誦佛書即忻忻喜悦父母以其有宿故乃命出家於邑之興化寺持規就度而若素習者十七游京師止天界日接諸老緒論釋然開悟既而泝大江抵荆湘遍求佛祖陳迹盡謁有道以正其學乆之超然而還止菴祥公與之語喜而謂曰子能為吾宗嗣矣公始出世於吳江普濟轉湖之天聖人皆歸之起廢為新其主承天能仁越十年言行如一日於乎公可謂傑然而不凡者與余記其事述其行以刻於石俾有勸於後來者從其寺之耆舊衆所請也以書數抵北京而恐予言與之後者藏主瑹荆石也承天寺重建大雄殿記吳寛蕭梁氏好佛其下化之一時佛寺江左為盛然尤莫盛於吳中若承天亦吳中之特盛者相傳寺為衛尉卿陸僧瓚故宅而捨以建者自梁以後廢輙興之至元至正間主僧南楚極力改作而其制之壯偉精巧絶矣黄文獻公實為記其事入國朝殆歴百年當正統癸亥之十月寺一夕大火蕩然無存又明年適朝廷頒大藏經至僧綱司都綱永端時兼住持特建堂九間以尊奉之其後僧徒相視莫敢復措手者盖三十年於此今住持道澤謂寺不可終廢也然功宜自大雄殿始乃謀建之盖承天固郡人之所瞻仰者也於時聞有是舉争出錢粟來助其徒戒昌更刺指血書法華經誓成其事而助者益衆矣竟以成化甲午七月丙辰起功凡六年而功始完髙廣深闊一如舊制凡所象設亦無不備於是澤公領鄉薦來受都綱之命乞予書之其言曰寺之功甚鉅此未及其半吾當次第成之而未可必也幸先畀之文以記嗟夫大雄之建非以奉佛也乎佛之道吾不能知然嘗觀於其書務為宏博廣大之説故學其道者每為宏博廣大之事亦惟好於上者極其䕶持而不拘以法禁化於下者致其崇奉而不惜乎財力此其事之所以成也今夫官府學校所以出政令而資風化是故有益於上下者或病其敝且陋而有所為焉費於公而罪戾至勞乎民而怨謗生繼之者視以為戒故有終其任不易一木増一瓦者此其事之所以廢也則澤公之為此舉固其才之長力之專以出乎其徒亦惟其為彼而不為此此其費若勞雖不可以數計卒能隨其用使致其才力以成乎所謂宏博廣大者而還郡中之舊觀也予故記之以示其後之人報恩萬嵗賢首講寺釋迦文佛卧像碑銘宋濂姑蘇報恩萬嵗賢首講寺乃吳赤烏初大帝為乳母陳氏所建名曰通𤣥唐𤣥宗因其年改作開元吳越錢武肅王為之起廢掲以支硎山報恩寺舊額宋徽宗崇寜初加以萬嵗之號至佛日崧公來為住持專講華嚴經疏尊為賢首講寺寺有淳祐鉅閣七楹間下覆釋迦文佛滅度之像相傳自唐則有之州民攀慕徼福者殆無虚日元季偽吳張士誠據有其地惑五行家之言强為佛卧非吉徴更造立像民情焦然弗寜及偽吳亡徳巖法師俯徇羣情起主寺事不二三年易腐為堅殿堂樓閣門廡寳塔之屬一一葺之焕焉如新已而嘆曰諸役幸粗完象可不復於古乎於是走告民間不分耄倪皆舉手加頟競輸貨泉以後為媿法師乃戒摶土之功斵嘉木為骨骼承以髙座塑卧像其上塗以五色覆以彩衾諸弟子涕淚悲泣環列前後摩耶佛母亦立其側悵然興哀唯曼殊普賢二大士神情閒曠超出死生之外用意精緻形模宛然像長六十六尺髙一十二尺曼殊等像髙一十八尺經始於洪武十一年秋七月十五日明年夏五月十六日訖功糜錢五萬有竒用功六百有竒伻來俾濂記之嗚呼佛之法身猶如虚空本無去來何有生滅其示八相以覺羣迷不過降本垂跡俾同人法而已本則真諦跡則俗諦真俗混融皆不思議之事烏可以異觀哉况八萬四千無非度門觸類而入洪纎畢逹姑以入滅論之實具華嚴五教大㫖小乗雖除我執未逹性空但知實色故示之以湼槃非近於愚法聲聞教乎色法二相本無自性皆從縁生滅度之際斷縁歸空非近於大乗始教乎應身雖法亦屬幻有幻有既滅真空獨存真空既存幻有亦住二體互融了不相礙非近於大乗終教乎滅而非滅非滅而滅非滅而有既滅而空空有雙泯理事交奪如如不動無即無離非近於大乗頓教乎熈連河間居然唱滅靈山㑹上儼爾常存隨舉即色隨舉即空如示一身不起于座如化多身徧滿塵刹無量為一一為無量力用相収縱横自在非近於一乗圓數乎諸有情衆若勝若劣來瞻靈像隨其機宜證入教位至於混極不翅親聞盧舎那演説圓滿修多羅之為快法師此舉其於樹教基續慧命有功於法門甚大非特福澤被於一州而已抑濂聞昔人設像俱有所表則非苟然也如來中居表衆生大覺之心飲光勝尊在左表自利之行慶喜在右表利他之行曼殊乗師子表大智而降嗔也普賢騎象王表大行以制貪也他如劔斧兩神則表觀空擇法二智取義深逺使人目撃而道存故歴代襲之定為常法而此湼槃之像奈何獨無所表乎濂因畧舉雜華之説斷然謂五教之理咸具不然佛法徧在一切處果何言哉濓既為作是説殷勤遐仰復學主夜神以偈贊佛之語繋之於後法師名浄行徳巖其字也博通帝心雲華賢首清涼定慧諸家書力振其宗於將墜之時一彈指間悉起諸廢其化導有縁以成法師之志者善長正宗二沙門也偈曰世雄大悲利羣物果後示權不思議既由應身顯法身從體起用宣妙法人機既得饒益故唱入滅度示化儀化儀有始而有終所以懲創懈怠者七寳牀中右脇卧慧日一朝竟西沒娑羅樹林皆變白諸天衆號雨天花四衆圍繞共悲哽妙香結樓奠金棺發三昧火而自焚各分舎利建塔廟如來雖入般湼槃畢竟終無湼槃者是知一性鎮常住不從變易有生滅倬哉賢首古伽藍三吳法㑹斯第一乃造湼槃微妙相因相攝入有情衆近遭紛更紊常制緇素煢然失怙依有大比丘起復古最先補苴詣樓閣一一莊嚴成妙境次令埏土肖靈像五色交纒廣博身州民瞻禮至洒泣如還故鄉逢故物此即大乗正法門種種皆能濟羣品觀者毋以像觀像如觀雜華大經王字字化為法燄雲雲中化物皆現前一身示現無量身無量身中現一身令我悉除邪見網直濟難思解脱海行住坐卧皆見佛佛之智慧如虛空無性無生無所依大光明藏時時現與我無同亦無别從上所言真實法衆生慎勿懐疑念重建寳光賢首講寺碑曽棨寳光寺在姑蘇長洲縣治之東北漢末􅉱林太守陸績捨宅為之故至今寺門外有巨石曰􅉱林石者盖以此也吳赤烏時郡守請頟於朝始賜名曰寳光仍命圓法師主之以為十方講刹歴兩晉六朝隋唐以來廢而復興隳而復振者盖嘗有之而寺之名迹固弗泯也迨元至正間佛殿兩廡三門講堂鐘樓經閣以洎衆屋靡不完具宏壯雄偉冠於一方可謂盛矣國朝洪武初開拓郡城始遷寺於跨塘橋西據婁齊二門之衝去舊趾才數百歩而近其後有詔併叢林於是境内諸寺悉歸於此方其時郡副都綱湛源圓法師實居此以領教事乃以所授賢首一宗教觀與四方學徒講説究竟克闡厥宗暇日與文儒縉紳之流倡和其間而寳光之勝遂煥然於勾吳之域矣永樂改元之初有楚蘭馨法師繼主於此將欲興造以復前代之規制而被召入京與修大典願弗之遂九年寺僧大禎大衍同心協力出其祖之遺資及傾已帑仍資檀施庀材鳩工剏建法堂聿新衆屋甫及三載遂告訖工輪奐重新金碧照耀真桑門之盛事東南之偉觀也今年冬楚蘭以校讐藏典留寓北京遂述寺之本末偕中書舎人王君和用來請予文記之惟佛氏之教入中土而四方禪林講刹星羅棋布不可勝數然求其若寳光之綿歴累代上下千有餘年而逾逺逾盛者盖亦尠矣是雖佛氏之靈有以黙相隂佑於其間然亦豈非績之孝行夙著而其流風遺韻藹然被於其鄉者有不能以遂泯歟是可書也因併書俾刻諸石庻後之人得有所考且系以詩曰東南名郡粤為姑蘇秀氣所鍾湖山奥區巋彼寳光巍巍梵殿云昔陸績捨宅以建􅉱林之石名髙穹窿伊績之遺凛其清風兵燹薦更有隆有替迨際天朝值兹盛世衆刹所歸蔚為叢林曰有湛源克振圓音賢首之宗益暢厥㫖其徒如雲見聞悉喜迄于楚蘭志擴前規承詔在公弗見於為繼此而興曰禎曰衍資帑克捐厥功以顯翼翼殿堂棟宇維新金碧煌煌有光璘霦暮鼓晨鐘旛幢杳靄如旃檀林若華藏海聖夀齊天佛道興隆勒石于斯以播無窮重修報恩寺寳塔記陳琦吳城之大刹最古而名著者惟報恩賢首講寺焉寺創於吳大帝赤烏初年而塔則肇於蕭梁時凡十一級屢墮刼灰至宋紹興間沙門大圓僅成九級即今塔是也然歴嵗既逺峻峙亭毒風摧雨撃易就隤毁過者興嗟𢎞治庚申今僧綱司副綱法津曽住是山請於吳邑宰鄺侯命僧徳夀鳩工修葺且戒諸人勿得撓其事未乆徳夀示寂衆舉僧徳昊道完宗恩司之洎善士倪道完復相其役各協乃心不憚勞勩若見若聞悉生喜躍於是大姓割其財小夫奏其力銖積寸累總費萬餘緡經始於是年五月明年是月乃底於成易腐為堅増新去舊珠頂光芒金繩交絡白蜃外飾丹梯上通像設粧嚴天神森衛欄楯旋繞層層如一風鐸之聲聞乎四境夜燈之燄燭乎半空顧不雄哉諸僧以興修之功不易皆邑侯外䕶之力不可無文刻諸貞珉用昭永逺乃持其所述本末介士英陳先生謁文於予按佛氏之説釋迦説法於靈山多寳佛塔從地涌出為作證明及其入滅留舎利八斛四斗為浮圗八萬四千遍滿娑婆利樂羣品此塔之所由興也若今之塔蘇文忠公曽施銅龜以藏舎利於中想即八萬四千之一也我國家神道設教仁夀躋民而亦妙嚴寳乗無乃象教之功易感蠢愚之善心也哉兹塔之偉麗觀者起敬可以拄持佛法鞏固皇圗為東南塔院之冠冕矣但今之學佛者或離乎真或蔽乎物髙者為名下者為利餘波末流無所不至而佛法微矣徳昊輩必不若是其得意以了心者乎因其請記故序其事而警之且以告後之同志者嗣而葺之庻斯塔之不朽也陽山大石巖雲泉庵記吳寛吳城西山連延不絶曰陽山在稍北雄偉特甚其隂石巉然起如人負竒骨而傴者當嶔崟􅛡硊間有僧居在焉號雲泉菴成化間余與太僕少卿李貞伯吳興張子静松陵史明古往遊自許市北轉入小溪舎舟從平田行仰見石勢欲墮舉足甚恐入門竹樹幽茂薜荔滿牆僧縁崖架木有小屋在石下益竒客喜而就宿聫為長句明日太僕大書屋壁復題名石上而去後二十年予再還吳中則太僕以下相繼而逝自嘆不能獨遊而徒得沈啟南所作巨圗時取而玩之耳一日有僧謁問其名曰智韜則菴之主人也曰山居屬公題咏後游者接踵而至大石之名暴著於時此皆詩人和篇也予既為書其末智韜復請曰菴未有為記者更乞書之盖山之有菴相傳為宋珍䕶禪師所創其扁則銀青光禄大夫齊國公徳剛所題然莫能攷其為何人也石之大且竒者散列不一當時與客議此可亭此可堂且軒者尚多今嵗乆其地如夢中事不能了了况予且老未知他日歸休再能遊否所幸主僧有開拓志來游者或能成之當再為書之刻崖石上蘇州府𤣥妙觀重建彌羅寳閣記胡濙正統五年秋八月望日兵科給事中郭璘禮部司務陳珪率道士張宗繼不逺數千里齎姑蘇道紀司都紀郭貴謙副都紀呂志清疏狀謁予南宮徴記按狀蘇州府在城𤣥妙觀剏自晋朝名真慶道院唐更名開元觀宋賜額天慶觀髙宗御書金闕寥陽之閣揭於殿端光榮罕儷有簔衣何真人寓居其中能愈人一切諸疾靈跡顯著孝宗召赴行在眷賚甚厚人咸傾向郡守陳峴命羽士募縁増崇修建雄冠諸郡寳祐景定間住持嚴守柔蔣處仁重加修飭施以欄楯元至元間黜天慶之號而改今額道士嚴焕之張善淵復為脩理時左轄朱文清大捐帑廪以相其役由是穹門邃廡奥殿巍閣傑出吳中元末至正間燬於兵燹迨今百有餘年殿堂廊廡漸次修建率皆完美惟彌羅寳閣工費浩繁乆虚未建誠為缺典宗繼乃募衆縁遂為創始正統三年廵撫侍郎廬陵周公恂如郡守南昌况公伯律因嵗旱率耆老命都紀郭貴謙禱於其觀遂獲甘霖二公暨闔郡吏民咸欲修墜舉廢戮力同心侍郎郡守首捐俸貲以興復為己任委都紀郭貴謙鳩材庀工貴謙先令化士尤𤣥真張養正至鎮江市木栰從揚子江歸遇大風衝散化士仰天告曰買木盖造彌羅寳閣供奉玉帝今木衝散不存斯閣莫能成就頃間風恬浪静忽覩𤣥帝見於雲端化士驚愕再拜至孟瀆河口木皆先集舉無漂遺衆咸駭歎不勝忻感歸以白於貴謙轉白侍郎郡守罔不驚異悚敬二公為之益力今年夏厥工告成複霤重簷金碧輝焕極其壯麗威儀像設嚴奉惟謹謂不可無以紀神明顯應之靈與夫侍郎郡守作興之績用垂示於乆逺也予惟有虞肆類上帝成周禋祀昊天而道家者流制為寳閣䖍奉玉帝實為虞周同一尊事之禮今其閣既成而請記於予又安得不深喜樂道而奬與其能乎是以為之記而不辭俾歸勒諸貞珉庻幾來者知所崇重而祗事於無窮焉重建清真觀記俞貞木錢塘黄孤山真士蚤嵗喜道術方藥南遊閩越北上燕趙晚止蘇城蘇人嚴徳昭者抱痼疾因築室建清真壇奉北極𤣥武真君冀遇醫愈疾聞真士醫多著神驗求療治之而其疾隨愈乃捨壇以真士主之於是募縁重剏建殿宇廣其廬舎真士嘗為崇安靈寳道士時其師潘雷鑑翁適自崇安來遂延之以開山焉三十八代天師為題其額曰清真道院仍建丹房售藥以給伏臘計既而翁與真士皆髙年終其弟子永嘉陳君正孚與其徒陶君希仁又加修葺遂以狀聞於𤣥教大宗師乃移牒集賢院改今額為觀云粤自潘黄二師開山於元之皇慶間以甲乙住山於是希仁求嗣道者得三人焉曰程安道曰馮本原曰楊處静及乙巳之嵗觀毁於火安道以售藥資粗剏未完丁未之嵗而安道又委蜕迄今洪武庚申本原與處静同心協力重建大殿山門兩廡塑真君與侍從像以明年九月訖功求予為記夫老氏之學以清净為宗其論谷神𤣥牝乃曰綿綿若存用之不勤則脩煉之微㫖存焉至抱朴子著内外之篇陶隠居註本草又皆發明藥石服食之祕然藥與道術相通修真濟人其功一也孤山既以醫鳴而蘇城之人無逺邇少長咸稱黄孤山道觀之藥之神自兹以往其諸弟子相傳雖無恒産而嵗積藥金有餘至本原處静悉傾其槖中所有以新其觀宇可謂善於繼述者矣噫古之列仙雖與世和光然徃徃泯其迹今孤山乃能傳之後人俾守其業而本原處静又能復興之而不墜且追繼開山之勞績念繼承之不可不任其事故又礱石刻文以示永逺是不特將以貽其後人抑亦有光於其教矣本原名寜髙年清修退藏弗耀處静名守中端慤守道闡教今為道紀司副都紀云福濟觀新建祠宇記徐有貞蘇城之乾維有靈宇焉巋其山峙翼其翬飛傑出乎闤闠之中而超軼乎埃􅅽之表者所謂福濟觀也觀之創自宋淳熙初舊名巖天道院院有真士陸道堅者嘗與省幹王大猷設雲水齋於此感㑹純陽呂仙翁授以神方大猷子孫至今傳以濟生元至大間繼道堅者葉竹居以申請得觀額竹居後王無偽鄒道安繼之所營為嘗盛矣迨元之季國之初洊經兵燹數十年來無能繼者風摧雨剥旁侵中陊寖以敝敝於時卧雲煉師郭君宗衡實來主之宗衡出自玉峯士族而學道冶城西山初師朝天提舉陳淵黙繼師長春真人劉淵然得清微靈寳净明神霄諸法之傳遊居兩京侍祠行宫乆之及領是觀顧而歎曰主張是綱維是而使敝敝若是前乎吾者往矣後乎吾者誰歟然則吾其可以但已乎乃言於郡守况侯伯律首復觀地之侵敓於旁人者用其法為人禬禳祈禜得佽助焉慎入約出鳩工庀材以漸經營中建𤣥天之殿為祝釐所旁作翼宇二一以祠純陽及南五祖北七真一以祠長春諸師自三門兩廡暨庫庾庖湢畢飭其法中所宜有者像設暨鼓鐘笙磬畢具又樊之樹之有池有島蔚然為城市山林宗衡乃集其徒以言曰吾聞之吾師吾道之所寳者三慈也儉也清净也是吾教所宜然也今吾徒從事於斯其必寳吾之清净以養吾之真寳吾之儉以養吾之身寳吾之慈以養吾之人庻乎其可爾吾又聞之儒之君子民生於三事之如一是世教所宜然也今吾徒出乎家而度乎世於君親莫之致力矣將惟師事是嗣而師復遷化如致力何惟是晨而香夕而燈致精誠以慰薦吾師若吾親之靈以祝吾君之釐事庶乎其可爾且吾之觀謂之福濟吾徒將何修而可以稱是名乎嘗試思之夫祝釐者盖祈乎天以祐乎君將以一人之福而敷錫乎天下以福乎億兆之人者也其所濟可謂博矣盍亦修吾之清净致吾之精誠以從事於斯乎雖然吾慮乎後之繼吾事者之或怠且忘也願從君子乎圗之遂因余伯氏以請記余謂宗衡遊方之外者也而余遊方之内者也夫道不同不相為謀余何以為宗衡謀哉然以君子之道而處其中亦惟眎夫義理何如耳彼譸張為幻者固余所弗與矣若其為言幾乎義理者亦安得不與之也耶余於是乎為宗衡記之清微道院三官閣碑都穆姑蘇清微道院在郡治西宋端平中建於法師余靈山至國朝永樂初而廢里人成普𤣥者募縁重建宣徳丁未𤣥妙觀道士王嗣先主之正統丁巳嗣先益廣其地建閣五楹奉所謂三官神者逾六十有五年為𢎞治辛酉閣四檐傾壊風雨莫庇院之道士王源清何惟榮募縁新之又謂斯院自端平至今歴年雖逺然未有文以記顛末乃來請於子將刻之石以示其後人予嘗考之漢有漢中人張陵與其子衡造符書於蜀之鳴鶴山制鬼卒祭酒等號分領部衆民有疾者俾書其氏名及謝罪之意一上之天著山上一薶之地一沈之水謂之天地水三官至衡之子魯而其術益盛則三官之名盖昉於此後之道家創為土木之像飾以冠服儼然南面以為實有其神由是閭巷細民往往趨以祈福夫道家祖陵稱為天師今若此無乃背其師之説乎雖然天下之事多出於襲而其襲之之乆雖有智者莫能卒變勢則然也故今之為道家者亦唯謹守其傳以事焚修求無墜而已矣是閣之壊殆非一日置而不修則無以祝聖釐聳人望非主之者之責乎源清惟榮是舉其費頗巨而且當盛夏之日身親其事不憚勞苦可謂有功於院者矣因不辭而為之記并系之以詩曰姑蘇為邦多老氏宫有若清微翹然其中由宋建今乆歴年嵗莫為之先後何以繼惟兹層閣穹傑洞明四檐翬飛勢凌紫雲神休是祈聖釐是祝朱檻一馮萬象森目風摧雨剥舊觀莫還爰有真士植仆補刓焕焉聿新煌麗逾昔邦人來遊無不嘖嘖稽之道家其宗無為曰清曰微一而靡他矧兹閣者超乎物表八囱玲瓏纎埃莫擾聖凡同歸其患弗修人而𡨕昏盍愧羽流刻我斯文置閣之右庶幾後人永永其守吳中金石新編卷六
