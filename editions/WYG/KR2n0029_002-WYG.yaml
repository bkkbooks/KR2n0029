body:
  text: 吳中金石新編卷二明陳暐編官宇倉驛附願治堂記王恕余以願治扁堂之明日有客來訪而問曰聖天子授公以保釐之任而有便宜從事之璽書凡撫内善良者公得而扶持之强禦者公得而禁遏之賢才有益於國家者公得而薦引之奸貪有害於政事者公得而斥逐之田野未闢公得而闢之學校未興公得而興之賦役有未均詞訟有未息公得而均之息之以至周窮䘏困伸寃理枉皆公分内事也今皆舉而行之亦可以言治矣而猶以願治名其堂何歟余曰善良者固多矣余豈能盡扶持之强禦者亦衆矣余豈盡能禁遏之賢才當舉而或不能盡知奸貪當逐而或不能盡察田野當闢而或流亡之未復學校當興而或教養之無方里書作弊賦役如之何得盡均教化不行詞訟如之何得盡息縱使盡扶持之盡禁遏之盡知之盡察之盡闢之盡興之盡均之而盡息之苟有一民之失所一事之不理亦不得謂之治治豈易能哉非但才之罪其勢然也余以菲才受厥命食厥禄豈敢怠厥事是以夙夜孜孜願治焉而未之能也願而未能其可忘乎故以願治二字揭諸堂欲其常目見之而求所以治之也客唯唯而退遂書之以為記觀風題名記徐有貞惟皇明有天下當髙帝肇大一統之初定鼎金陵以蘇松常鎮為京輔郡如漢扶風馮翊之於長安也其地大人衆事力之彊控制江海屏翼天室而財賦所出國用所資最天下視扶風馮翊為加重以是天子之命御史出廷廵按以察吏治而觀民風於斯四郡常加之意焉廼成化三年監察御史古滄張海朝宗實來以斯四郡皆京輔而蘇為㑹府凡國初以來歴政交承舊章成案之籍於是乎在顧兹察院規制雖備而題名之典猶闕乃於治事之餘考求前政得五十有七人列其姓名而刻之石命之曰觀風題名將待後政者繼而題焉以昭垂於世來請記予謂觀風者御史出廵之一事爾若舉其所職豈止是哉盖其官天子耳目之官也自成周始建秦漢以下代因之而於其制有所崇益分三院綜五曹監列郡司六察斯已重矣至我朝乃合歴代之制而一之故其官視歴代為加重入則廣天子之聰明於内辨正邪别淑慝公是非使朝無倖位國無寃人奸宄無所投其隙而四門有穆穆之風焉出則廣天子之聰明於外究利病審枉直慎舉措使吏無廋弊民無隠情虣墨無所容其間而四方有平平之化焉是其所職若耳之職聽清濁之不淆而雅鄭有可察也若目之職視白黑之不混而妍媸有可察也苟為不然則不職矣夫四體有不職在耳目以察之耳目而可以不職乎哉百司有不職在御史以察之御史而可以不職乎哉彼聰有不及則聾明有不及則瞽聾瞽為其有所蔽也蔽之由人且不可矧可自蔽耶聰明蔽於上而事物亂於下君徳將焉正國是將焉定官邪將焉儆民隠將焉逹耶是故天子之於御史任之常重而御史之自任亦重其所以重者盖歴代然矣豈惟我朝而我朝為加重於天下然矣豈惟京輔而京輔為加重誠以首善之地其近於天子譬猶在乎耳輪之内目睫之間也承乎徳音而被乎徳輝實有加於天下視聽所及固所當先而可後哉朝宗之賢其有志於斯也必矣故於斯舉盖將即前政之臧否為後政之勸懲孰其稱職而可師孰其不職而可鄙必有辨之者在然則題名之記豈惟表章風憲為觀美於一時而已萬世之下於我朝制度尚亦有所考焉來鶴樓記魏驥今工部尚書廬陵周公為左侍郎時廵撫浙西諸郡按部至姑蘇寓於宋大儒魏文靖公了翁之鶴山書院正統十一年十一月二十有一日集郡縣官僚民庻授以約束忽䨇鶴自南而來翔集於庭衆環視喜愕咸相慶曰鶴乃尚書所服之制公必自此而升歟又曰鶴乃仙禽能調息引年其為公長夀之徴歟衆方議未定而郡守古婺朱公知是日乃公初度之辰遂躍然而喜曰斯鶴之來不來於曠地而來於衆目所視之庭不來於他日而來於公慶誕之辰是為公之瑞無疑斯不可以不紀乃首捐已俸為倡率僚属於鶴所止之地萃材鳩工剏樓三楹既落成大書來鶴二字以顔之且因郡人翰林檢討王君具顛末索予記予惟瑞不徒瑞必因人而瑞公發身賢科為翰林庻吉士䝉太宗文皇帝選㧞二十八人之列績學文淵閣才器大成遂膺擢任踐揚中外屢有成績頃以浙西水患民食官賦皆有不足武斷鄉曲者由之而起郡守縣令或莫能制公膺簡命廵撫其地宣布教條民翕然從令而所謂民食官賦皆不勞而給足強梁䟦扈皆不治而銷靡數郡之内人和神悦莫不感戴以為朝廷任用得人所致也昔人有孝友于其一家者其園林尚有鳥不擇子而哺不争巢而棲之應况公之徳化洽于數郡然則鶴之來庭豈偶然哉易曰鳴鶴在隂其子和之盖言誠之感于下也詩曰鶴鳴于九臯聲聞于天盖言誠之格于上也今公之廵撫東南也夙夜惓惓専以愛民澤物為心其誠之感于下者從可知矣公爾忘私國爾忘家其誠之格于上者又可見焉斯鶴之來其為公之所感召也必矣公今位躋六卿康寧無恙夀福之來未有涯涘誠不可以不紀也且朱公之為人練逹有為誠東南之賢守若公徳化之成盖亦與有力焉他日清風髙節豈不可與昔人一鶴自随者同其聲光於無窮哉公名忱字恂如朱公名勝字仲髙故併記之退思堂記陳孟浩蘇州府治舊名平江在長洲縣之東北厥後徙於縣之西南改平江仍以蘇州名即今治所是也自洪武初經今七十餘年來守是郡者非一人考其勤民之政行事之善惜乎欝湮而未有聞焉宣徳五年秋聖天子命舉在部賢臣為天下郡守禮部郎中况侯伯律其一也侯以能聲薦拜蘇州太守奉璽書來牧於兹委以重寄蒞政之始視官事如家事且急於修舉廢墜郡有泰伯伍相城隍廟及陽山白龍祠内外舘驛惠民藥局皆欹仄敝漏侯見而太息曰事神治人我之責也亟擇善治事者董工盡撤而新之俱不勞民力而成至於府堂蓮幕吏舍弗具者悉令完舊益新又與僚佐謀於府治之後構公廨一區以為退食之所意未敢擅作乃請于朝朝許其請於是鳩材僝工經始于庚戌之秋迄工於是嵗之冬深奥靚宻忩户疎逹復自扁曰退思堂翰林侍書程南雲大書三字揭於兩楹之間其意以政有所未逮則退於此而致思也且屬予記之予告之曰心之官主乎思也思則智慧生而是非得失判然於胸中而無疑也故思之於人大矣哉凡天下之事未有不思而得者以周公之聖一有不得於心猶且仰而思之夜以繼日况衆人乎蘇為郡領縣七當東南之都㑹地大物衆生齒繁夥錢榖税粮甲於他郡素號難治故為郡於蘇者施政事於此不能熟思而審處則未有得其平者矣夫欲平其政如之何而弗思此為政所以貴乎思也想侯日退斯堂神氣清明坐而思之民情欲夀則思若何而保其生民情欲富則思若何而厚其生獄訟之興弊若蠭午則思何以决之租税之重徴輸愆期則思何以集之顛連無告者思有以恤之也賦役不平者思有以均之也事有可否思與僚佐而協謀定論理有顛倒思從公義而明辨是非某也亷介有守思舉其善而揚之於衆某也奸䛕挾詐思聲其罪而懲之於衆孰為可用而思進之孰為可疑而思退之在已之有過則將速改其過折獄之不正則必審克其情動静云為不離乎道舉措施設必協乎中事事於此退而思之審而施之庻㡬政平訟理則鮮有過舉而無沗厥職矣嗟夫侯朝斯夕斯兢兢業業上竭忠於國以圖補報下施澤於民以盡撫安他日報政於朝書最上考託以大任鋪張鴻猷黼黻治化則光輝斯堂不其偉哉吾故不辭而特書之俾刻諸石俟後之來繼守於是者誦斯文為政皆以侯之心為心則斯堂之光豈有窮乎昭賜樓記劉昌成化十年知蘇州府鄱陽邱侯以郡城之胥門故姑蘇䑓盖宋王㬇作而亭館之廢久矣乃移建姑蘇驛于其下以與逓運所並匪徒舉曠典復舊觀亦以光國容便給役也既又作樓四楹以登以翫而太湖之水由石塘注運河踰城而西以逹于驛以北出市衢縈廻映射闌楯之間光景浮動城西諸山則如旗旄騎從前導後擁滃然而馳集其大者左曰穹窿右曰秦餘杭髙拱駢峙若張翼而進者而天平一峯號為郡鎮端重如玉柱以屹然出乎羣山之中而樓適臨之其羣山之勝有曰靈巖五塢仰天秦㙜皆如正人直士陪位而坐秩秩有序此天所賜以壯固乎吾蘇而蘇民若未知者樓居既成山若加培水若加浚若天墜地湧一日而有驛復雄麗且邇逓運所國容光華百需悉具無向者離越留滯之擾此皆邱侯之賜也邱侯曰不然吾之成是役實惟洛陽畢公公以天子股肱之臣來撫來廵吳民恬嬉而吾志用成此畢公之賜也畢公曰不然朝廷安養斯民既百有二十餘年禮樂之教仁義之化已深入乎民心民供賦出力之餘益務於忠孝勤敏勤敏則不懈忠孝則易使民至於易使不懈而是役成此朝廷之賜也而朝廷諸節使之行過是驛者又言天子以四海九州之民付守令茂圖治理而不自居其功今海内乂寧民不知兵以樂乎畊蘇為東南大郡嵗比有秋民得從邱侯復曠古之典表一郡之望以助成國家萬世之業此又天之賜也夫天之賜朝廷知之而民不知朝廷之賜大臣與賢守令知之而民不知民之所知者曰惟邱侯之賜則邱侯推厥所由可不思所以昭顯天與天子之賜之深于無窮哉裒聚翕合於此而使民知之此樓之所以作也請名曰昭賜樓而為之記邱侯名霽字時雍天順庚辰進士以刑部主事擢今官博學善文而多佳政云燕思堂記楊循吉國家立鈔闗一在蘇滸墅嵗以户部主事一員司其入今天子龍飛之九年劉君堯章實至至則克殫厥心賢聲茂著商旅莫不願出於其途而賦亦倍登惟是公衙之宇不足無退食之室賔至茗於㕔事弗便慨將畫之顧視厥後有廡相直惟闢右式宜則窒其北墉其南垣其外中設揖讓之位而且以為息焉不費而亟成易規而大備既成題曰燕思之堂於是延凉納温冬夏咸宜圖史在座花石盈庭客之登焉者其不樂之他日以其意命予以記曰官政之修惟思乃克然非偃仰優柔之有地則思亦無寄焉自吾之來兹夙夜匪懈將惟勉其職是圖然而南檣北柁日勾校不暇雖欲覧古今以求通於務有弗能者故吾之為斯堂盖以思而不以豫也敢弗志乎且是塗居津要之㑹鉅公魁士由四方而來者無不得晉接是吾堂實有人焉彼皆天下之賢俊吾宜思而與之齊庻其及也夫燕居燕也燕㑹亦燕也一名二義而皆用吾心故謂之燕思也子其書之君名煥真定藁城人癸丑進士蒞官公清尤洽文史達于治而厚於徳識者期以逺大其為是堂廣已之道而遺後之益抑非無謂以為也遂謹受而記焉若其槩君所云皆具書事貴核故不復列吾言云移建姑蘇驛記邱霽姑蘇驛有二一在府治西一在盤門外丞一人總領之郡當南北要衝授館致餼者無虚日而府西驛已久廢盤門者存亦就敝矣且去府治逺禮賔往來上下告勞予假守是邦之明年思移置之請于廵撫大臣曰可請于廵按御史曰可遂度地胥門外逓運所之南負城面河地頗陿弗稱乃植木水中為滉柱作石隄三面凡四十六丈廣地得縱八丈衡如隄而殺丈十六建屋六十楹皇華亭據其前後有重屋名昭賜之樓著所自也燕休登覽盡得山川之勝所謂中吳之偉觀庻㡬在是仍撤舊材更新運所門與驛並費不出民皆自規措役凡十閲月而告成於乎禮賔眂館三代之政也晉惟崇舘子産與之陳無寄舍單子譏焉矧兹大邦烏可不備霽不敏承天子休命來綏兹土安敢妄自菲薄亦為所得為而已是役也其容已乎雖然成之亦不易也來者尚嗣葺焉濟農倉記王直君子之為政也既有以養其民矣則必思建長乆之利使得其養於無窮盖仁之所施不可以有間也蘇州濟農倉所謂建長乆之利而思養其民於無窮者也蘇之田賦視天下諸郡為最重而松江常州次焉然豈獨地之腴哉要皆以農力致之其賦既重而又困於有力之豪於是農始敝矣盖其用力勞而家則貧耕耘之際非有養不能也故必舉債於富家而倍納其息幸而有收私債先廹取足而後及官租農之得食者盖鮮則又假貸以為生卒至於傾産業鬻男女由是往往棄耒耜為游手末作田利減租賦虧矣宣徳五年太守况侯始至問民疾苦而深以為憂會行在工部侍郎周公奉命廵撫至蘇州况侯白其事惻然思有以濟之而公廪無厚儲志弗克就七年秋蘇及松江常州皆稔周公方謀預備適朝廷命下許以官鈔平糴及勸借儲備以待賑恤乃與况侯及松江太守趙侯豫常州太守莫侯愚恊謀而力行之蘇州得米二十九萬石分貯於六縣名其倉曰濟農倉盖曰農者天下之本是倉專為賑農設也明年江南夏旱米價翔貴有詔令賑恤而蘇州飢民四十餘萬户凡一百三十餘萬口盡發所儲不足贍田里多餒殍者周公復思廣為之備先是各府秋粮當輸者粮長里胥皆厚取於民而不即輸之官逋負者累嵗公欲盡革其弊以惠民是年立法於水次置塲擇人總收而發運焉細民徑自送塲不入里胥之手視舊所納减三之一而三府當運粮一百萬石貯南京倉以為北京軍職月俸計其耗費每用六斗致一石公曰彼能於南京受俸獨不可於此受乎若請於此給之既免勞民且省耗費米六十萬石以入濟農倉民無患矣衆皆難之而況侯以為善力賛其决請於朝從之而蘇州省米四十餘萬石益以各塲積貯之贏及前所儲凡六十九萬石有竒公曰是不獨濟農飢凡粮之逺運有所失及欠負者亦於此取借陪納秋成止如數還官若民夫修圩岸濬河道有乏食者皆計口給之如是則免舉債以利兼并之家農民無失所者田畝治賦税足矣是冬朝京師以其事咨户部具以聞上然其計於是下蘇州充廣六縣之倉以貯焉擇縣官之亷公有威與民之賢者掌其帳籍司其出納毎以春夏之交散之先下户次中户歛則必於冬而足凡其條約皆公所定畫俾之遵守又令各倉皆置城隍神祠以儆其人之或怠惰而萌盗心者宣徳九年江南又大旱蘇州大發濟農之米以賑貸而民不知飢皆大喜相率詣况侯請曰朝廷矜念我民輟左右大臣以撫我思凡所以安養之術盖用心至矣而又得我公協比以成之往者嵗豐民猶有窘於衣食廹於債負不能保其妻子者今遇凶歉乃得安生業完骨肉此天子之仁廵撫大臣之惠我公賛相之力也今濟農倉誠善矣然廵撫大臣有時而還朝我公亦有時而去良法美意懼其乆而壊也則民何賴焉願刻石以示後人俾善繼之永勿壊况侯然之屬前史官郡人張洪疏其始末因醫學官盛文剛來北京以書請予記予觀成周之制縣都皆有委積以備凶年隋唐社倉盖本諸此我太祖髙皇帝嘗出楮幣屬天下耆老俾積榖以濟民亦成周聖人之意也歴嵗浸乆其弊滋甚至於無所質究有司亦不之問而豪右兼并之家盖無處無之則天下之民受其弊也多矣豈獨蘇州哉今蘇人得吾周公以沈毅閎逹之資推行天子恤民之仁况侯以闓敏勤慎佐之收其枉費以施實惠而民免於餒殍之患豈非幸哉後之君子因其舊而維持之使上之仁被於無窮而是邦永有賴焉則豈特其民之幸乃二君子之欲也故為之記使刻寘六縣之倉以告來者若其為屋若干楹所儲米若干石典守者之名氏與其條約之詳則列之碑隂而諸縣皆載焉使互有考也獨崇明縣在海中未及建置遇歉嵗則於長洲縣倉發米一萬石徃賑焉其為惠亦遍矣周公名忱字恂如吉安吉水人况侯名鍾字伯律南昌靖安人其歴官行事之善當别有紀載之者此不著重建永豐倉記陳鑑永豐之為倉奠于閶闔門内所以偫長洲吳吳江崑山常熟五縣嵗入之賦而凡文武之士官于兹與夫介胄胥史之徒之在官者咸仰給焉倉址既隘浸弗能容屋乆滋敝其何能偫前郡守林侯一鶚嘗欲闢而新之遽以憲節蒞江右乃止貳守王君仲顯盧君廷敬與二三寮友合辭請于上詔下廵撫劉都憲顯孜遂以委之今郡守邢侯克寛侯經營量度布位定方縣水置􅈏條列咸具舊有滸溪倉隘其坤維徙而稍西地形乃方於是乎羣工子來五材就飭授之成算無愆指畫弗為過侈以傷難弗為苟成以傷易樸素堅好實惟永圖倉之為屋凡十有一聨三峙其北聨為間凡十有三峙東西者其聨與間之數皆如北二峙其南其為間則視北而嬴其二聨為厫者三厫之為屋或四或五不一其數聨又别為五小樓於屋極疏其櫺以泄米之氣屋下地衡布以巨杉而閣以甓乃藉以厚版以閷地之溼通為屋以間計者百四十有七以厫計者三十有三以千文字第厫之名天尊而北中據以專其一一竒數也地卑而南分據以擅其兩兩偶數也天地定位於是自北而南復轉而北而東而西既而復東仍轉而西至於陽字而極焉厫貯米以斛計者多或至萬五六千少亦不下萬二三千通可貯四十餘萬嵗費若干斛其所積可至七八年雖有凶荒之嵗民可無菜色也北之左隙髙揭一樓以司更鼓而守者知警焉繚以周垣首以重門以司出入而主者得以防范焉中為砥道扺倉之半則有㕔事三楹司出納者得以蒞事焉此特取其少蔽風日故仍舊貫而已中門之外左為神祠以棲司倉之神右為寮屋以舍庾官之屬倉中之地空曠平衍可曬可晾可委可積收入之頃民尤便焉經始於天順甲申冬十有一月落成於成化丙戌春閏月工既訖功邢侯授簡俾紀其成嗚呼天下之事憚其難則慮事機之失忽其易則非經乆之圖惟勿難其難則無棄事勿易其易則無苟成兹永豐之為役亦大矣大必難難斯憚矣憚則弗為而止爾苟或易而忽焉忽則苟苟則易敝易敝則弗若弗為之愈也初邢侯之為是也忽罹歉嵗人曰可以止矣侯曰吾豈無所用情於斯民者哉亦計之審矣先正范文正公救荒之䇿政欲使貧民仰給于公耳且今之為皆公帑之餘不敢傷民之財竭民之力以糜民之骨肉也彼無食之徒皆得餬口公家不至為溝中之瘠顧不可乎既而民不知勞公無所擾而事隐然以辦覆瓦甃甓堅緻完美不為苟作凡所宬貯無乆儲速腐之患而公私逺近㒺不隂受其賜者矣論者於是始服其雅量之不可及也侯來吳二年小大之政罔弗咸宜乃今嵗則大歉民心皇皇猶弗忍釋而他去者所賴以有恃怙也詢諸父老皆謂自我朝置守以來所未嘗有然即斯倉一事已足以例其餘况大者乎予故詳著于篇庻㡬來者因此以識彼且時其修葺謹其出納相與保之以無堕其成亦可無媿乎侯之用心也若夫侯所過而入民之深者則有甘棠之思在予奚容喙侯名宥克寛其字東廣之文昌仕族子予同榜進士為明執法知台州府轉吾蘇云吳江縣重建濟農倉記楊循吉進士廣平郭侯以𢎞治八年奉命來宰吳江一政令之建苟利於民必亟為之盡其力於是興作煥列而濟農倉之復厥功懋焉倉在邑城北隅宣廟時故廵撫工部侍郎文襄周公所設以貯餘米而賑農者也其法稔則積荒則散若古常平民用利賴而與水次諸倉逺隔三里别而弗混所以分正羡示專獨而清出納先正為人之意甚逺而不可忽也審矣先是景泰中民大飢乃始盡發所積哺民而荐荒相仍莫有以輸倉由是虚廢有司因撤而畦之倉之弗復盖四十年于兹矣侯至首閲廪庾考盈縮而豐年適登陳陳相襲所謂羡餘之粟或塞正厫而不得發乃稽文襄之制覧故倉之基慨然以為天子仁聖惻憫黎元以属之邑吏今倉名濟農而漫不加省將非職且俾儲無别而校無徙斯治粟之所以敝也盍取而復之乎詢謀既同請諸執政並許得以經度支勸從事侯乃鳩材召工惟良若能而以属吏沈經與義民之謹者龎鏞等司其市買而督工程焉凡為厫八十間計其所貯可容八萬而制作堅宻匪直如大凡官程之苟簡者盖一一皆侯心思目歴之所致也其經始在十一年春二月工已垂就而侯以守制去任先期具倉事支費聨為大牘移縣一毫絲皆明白有歸且督勵主者以速成為慊侯之律已嚴潔而公爾忘家如此至是儒學教諭髙君來属予記昔文襄之為是倉也盖遍於六縣而吏部尚書王公實記之予讀其文而知當時建立之不易以為後世良法之蔑以加也然昔之畦之者必曰一水次足矣奚濟農為遂使君子澤人之道不旋踵而沮是豈知益國而惠下者哉今侯乃克重恤民隐舉墜典而復之可謂得為政之大體矣其邑之人將洋洋而歌永永而思乎侯名郛字于蕃肥鄉人髙君名志曲阜人用敢詳書以記于兹石望湖閣記浦應祥𢎞治十一年冬聖天子授勑於工部郎中傅公潮總督江南諸水道自淮抵淛凡數十郡邑公受命惟謹星馳馹駛陸輿水楫遍觀博訪於水之為民利且患者殫心瘁力務濬導而隄防之皆經逺計三年來民忘旱澇之虞嵗享豐穰之慶公之功偉矣而吾郡形勢考之圖志三江五湖之所浸滙地最卑下而賦税之繁反甲天下郡往時一經雨潦七邑告灾下困上憂遂致阽危此尤公注意之深者今而祛災逆釐害除祉隤合郡民士感公之功較之他郡奚翅倍蓰也公分曹𨽻郡第㕔廡之後地甚卑陋乃凌架一閣題曰望湖間嘗登覧焉而具區陽城諸巨浸隐隐在望爰命予記于壁予辱公之知愛頗乆不敢以匪文辭惟古先哲一有所存省于𠂻則盤盂几杖門榻坐卧之所悉有銘志所以示不忘也公自臨蒞以來憂勤惕勵不鋭始而怠終致事舉而功就若可少紓其懐矣兹髙揭是扁朝夕斯顧公之心何心哉誠安不㤀危之盛心也挾此以往則他日之相天下推是心而有餘矣公之兄大宗伯先生徳望為天下先拜相指日而公才美昔嘗在内翰兹以芳績重譽進擢復居詞禁則弟草兄制俾韓持國故事不得專美於前此又當代昆季莫伍之榮盛也敢於繆説之殿併記之以驗祝望之私云治水分司題名記張習天之生人藉水土而水過多則為患神禹氏治之功與天地凖代之職水者雖小大不侔其得一日而廢耶故周有匠人稻人漢有水衡水司空宋有都水監元有都水使司莫非為是設也我朝初不置專官然於三呉之水則惓惓焉纔遇澇溢必遣廷臣出治待其平而後已洪武永樂間皆然自宣徳來始用廵撫大臣兼之郡邑各添治水貳倅丞簿猶莫能統於一成化初復設憲臣提督其官係浙臬去吳頗逺未便𢎞治辛亥三吳水至壬子為甚甲寅尤甚近臣奏命工部亞卿徐公蒞吳首决吳江之壅田次濬常熟之淤港而水漸疏息事竣還朝以謂平治水土我部司職也烏可簡忽以貽宵旰之憂乃奏革憲臣而輪選本部屬之賢者一員專治焉初得主事貴溪姚君文灝不久以病免廷臣㑹議須老成練逹如都水副郎新喻傅公為稱遂陛陞正郎領璽書而來公身任其事徧歴所轄相地宜究源委即分司之在蘇者處之其松常嘉湖等六郡則以時廵之於焉開陂塘浚浦港鑿溝澮築隄防以至輿梁之脩運河之通凡有益於官民者慮之無不周而行之無不敏矧疆宇之廣往返動數百十里其為工靡可以尋大計時日論也如是勤渠三年而治功告成雖遇水溢弗為患嵗屢登而民咸悦舉祝頌公公以分司之名實本部司分設而得其政不敢不勉不可不為後政鑑也用題名之石授習記之習耄何言哉竊觀天下之水皆流動不息惟三吳在東南最卑下書所謂土惟塗泥田惟下下故水常若滙而不流雖流亦不甚湍急所以沮洳而宜稼惟其宜稼故生齒為甚繁而貢賦為甚重夫三吳為天下生齒之繁貢賦之重而吾蘇尤為六郡之甚繁而甚重者故三吳之水所當治而吾蘇尤所當先也且蘇之境切臨太湖湖受寧國等八郡之水積霖汎濫蘇必先當之苟欲疏洩亦不過即是境以導瀹俾注之海而後可殺夫滔天之勢故蘇之水治則三吳之水無不治矣分司之設於蘇已挈其綱領而致治功之亟成宜哉嗟夫水得其治然後田有秋田有秋然後民生遂而貢賦充貢賦充則國用無不足國家視吾猶倉庾也帑藏也兹治既成豈惟足國之用而已上有以副聖天子委任賢臣之盛心下有以安列郡億兆之民生忠愛並施而不相悖哉孟子曰禹之行水也行其所無事也行其所無事順理也治水之職本諸順天之理未有順於理而利有不興害有不除者由是而知三吳之民自今以往莫有昏墊而無訴者矣然則題名之舉詎徒表章一時治功為觀美百世之下於我朝設司任賢思患預防之意無非益乎民為有所考焉爾吳中金石新編卷二
