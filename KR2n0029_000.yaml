body:
  text: 吳中金石新編目録類二金石之屬提要臣等謹案吳中金石新編八卷明陳暐撰暐字耀卿河南人宏治中官蘇州通判與吳縣知縣鄺璠舉人浦應祥祝允明等采郡中石刻彚而録之自校校官宇倉驛水利橋梁以及祠廟寺觀諸碑碣分類編輯區為七目凡一百餘篇皆具載全文用朱圭名迹録之例採輯金石文字者原主於搜剔幽隱考核舊聞故歐陽趙洪諸家惟主於搜求古刻是編以漢唐舊迹多見諸書獨取明初諸碑體例雖不免少隘然其所録如濟農永農倉諸記則備陳積貯之經許浦湖川塘諸記亦具列疏濬之要皆取其有關郡中利弊者而於頌德之文諛墓之作並削而不登其用意頗為謹嚴且多有志乘文集所未載獨賴此以獲傳者亦頗足為守土者考鏡之資以是作輿記外篇固未嘗無所禆益也乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:477899cf9d2c09a7a5bee533f9f6e6904252f0accc0e914e8507e12d46cbefaf
