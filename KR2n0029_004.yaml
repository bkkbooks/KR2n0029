body:
  text: 吳中金石新編卷四明陳暐編橋梁重建安里橋記薑漸蘇州府城之東南曰葑門其水陸之要衝有橋曰安里自宋歷元嵗久滋廢里人周君玄初時修真於城東之丹霞館憫其人民之艱於行也謀於里父兄撤而新之經始於甲午秋八月畢工於冬十一月欲求余文以為記而遭世變故不果閲六年庚子復請記之嘗為之言曰文之有記所以志其制作之勤蓋古人經久之意也近世承平日久碑銘墓碣無處無之可謂盛矣自兵革屢興皆靡有孑遺雖古今士大夫之文傳不傳不可知未嘗不竊嘆其碑之不幸也向使玄初得余文而刻之則其存可冀乎矧欲以余不足傳之言刻之於既毁之後其不為逹人之所慨者希矣辭不獲則書其言俾刻之而玄初亦以多故未遑也大明建國之元年師臨於吳凡附城之輿梁悉為內兵所毁獨是橋賴今大丞相信國公駐師其前無敢廢壞及克城之日師由是而進橋有力焉玄初竊自慶其功之不泯也復來請曰吾始為是役將以濟夫病涉者而已又豈知造物者俾吾新之留以濟夫王師也不然何故者皆毁而新者獨全乎是宜重為之記以夸示於無窮也噫余之言其果可傳者歟然自甲午至於今蓋十有六年一求豫文而不果一為記之而不暇刻凡再罹於兵而橋幸不毁終濟王師以成大功則余之言果可待而傳者矣是不可以不記故不辭而具載之使來者有所考焉重建寶帶橋記陳循蘇州府城之東南古運河有橋曰寶帶按河自漢武帝開以通閩越貢賦首尾亘震澤東壖百餘里風濤衝激不利舟楫唐刺史王仲舒始作巨隄障之以為挽舟之路實今為郡之要道也然河之支流斷堤而入吳淞江以逹於海者隄不可遏橋所為建也仲舒鬻所束寶帶以助工費故因以名宋元以來修葺不繼遂致傾圯無遺有司架木以濟行旅每有覆溺之患正統七年廬陵周公恂如以工部右侍郎巡撫兹地覩之興慨乃與知府朱勝謀曰是役工費浩繁不可輒為乃戒有司豫備工材之用又四年為十一年公率知府及長洲知縣張旻吳縣知縣葉錫往計度之所積咸具而俾耆民李禧等董其工橋長千三百二十尺洞其下凡五十有三而髙其中之二以通巨艦其用材計石二千六百丈木四萬二千五百株灰二十四萬三千六百斤鐵一萬四百斤米二千六百石橋既成咸贊頌曰此周公與朱侯經畫之得宜縣大夫奉命程督之有方其惠甚大不可無記會錫以考績至京師來求為文夫為政之道在於惠民惠民之事苟有所當為雖聖賢亦未嘗嫌於勞而不為孔子言政之美而曰惠而不費勞而不怨孟子之謂王政亦曰嵗十一月徒杠成十二月輿梁成而民不病於涉蓋謂事之關於王政雖費且勞亦不為過而況於不勞者乎况於惠而不費者乎諸公之為惠於是邦而能免聖賢之所不嫌其超出於衆人之從政也逺矣豫故嘉之而為記重建越城橋記張習吳邑西南橫山之下衍石湖之水而東注者曰越來溪溪之上湖之澨有石橋名越來溪橋又謂之越城橋蓋今之新郭即春秋時句踐築城以伐吳之地城堞髣佛具存而橋與之尤近故名橋之創未可據所可驗者重建於前元之至正再修於國朝永樂之乙未風激湖波旦夜淘嚙嵗久漸圯邑令文侯為令之三年政妥民安嘗號於衆曰王政之一事非杠梁之謂乎間頽而未舉伊誰之任乎有以是橋白者侯即首捐俸資以率邑之願助者聽選民之耆而良者徐衢等董其事仍諭以其風波衝蕩之故墜矴提杙務力倍蓰堅固經始於成化乙亥五月之朔落成於明年庚子六月有六日崇廣若干丈視舊各加以尺計者二旁增石欄下袤石址由是人之所履物之所載咸出焉入焉而無少窒也僉感侯之德以習為邑人授書於石庸記焉考諸成周之言曰辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁此有司濟人分內事也夫何政不古若司民社者視治道成梁事為泛常故民往往有病涉之歎况吳為澤國舟楫之所通行者侯頴敏好古勇於為義凡諸廢弛必舉而新之則他日為我國家謀猷之逺大豈不猶之治一邑也邪侯名貴字天爵遼陽人成化乙未進士兹奉天章召入憲臺司風紀併繫此所以慰民去思之槩云重建尹山橋記錢溥天順六年秋七月長洲縣重建尹山橋成其冬豫使交南還縣耆老浦嗣昌迓豫而請曰尹山距吳城東南十里許有土巋然起若覆笠而枕于運河之陽舊有石梁跨其上廢凡四十餘年有司憚其工巨而費殷僅駕木為梁既髙且危每風雨晨夜間商旅提擕樵蘇負荷而往返者不無奔仆跌溺之虞都憲萬安劉公巡撫東吳叢務既飭大慰人望爰命郡守黃巖林侯曰是尹山為民涉之病盍易木以石乎捐俸以倡之橋不踰年而底於成長凡二十二丈三尺髙四丈二尺而廣視其髙三分之一以石計四千五百五十以工計四千九百有竒堅緻宏壯視昔有加先是滅渡寶帶二橋正統初大司空廬陵周公嘗命郡守况侯成之尹山雖同峙吳城之南獨遺之而未舉豈非有待二君子乎噫橋聿成於久廢之餘功甚難也劉公能廓先輩之宏規林侯存心愛物將有過於前守之為者宜其同德協謀成此有不難也願為文志之以為頌豫曰事出於昔人之所難而成於今日之所易非惠而知為政乎鄭子産春秋惠人也捐所乘輿以濟人於溱洧孟子譏之蓋謂政有大於此者諸葛武侯嘗謂濟世以大德不以小惠至於治蜀而橋梁道路靡不繕理然則冬月成梁民自免於病涉矣何必市惠以徼名哉二君子可謂知為政矣蘇人歌誦將踰於鄭輿人之頌推是德於人人當不止於治吳也系以詩曰尹山有橋界於吳域石既云隤木貽其戚都憲治吳大施厥德命彼郡侯俾復以石過者思焉永其無斁葑門塘改造二橋記吳寬吳城東為長洲境其南曰葑門門之東有河河上下有塘塘之東曰梅里涇又東曰金涇舊皆有木橋以通七區之人往來者嵗久傾圮人以為患里有義士盧圭廷玉者居常曰圭遺腹子也惟吾父母早世幼鞠於伯父以長年十七即自樹立成家今幸有田廬而衣食不缺者豈圭之自能哉吾父母積德之所遺也且聞吾父母嘗有意於義舉而不及為使吾吝所積而不肯為人不惟謂我愚而亦為吾父母辱矣然吾雖常為之顧無以及於衆也惟二橋人迹必由者是宜伐石改造為經久計乃召工市材擇日興功以𢎞治十年二月始造梅里涇橋橋成里人僉名曰通濟明年十月再造金涇橋橋成僉以廷玉之功不可忘也則名曰盧家橋以紀之工部郎中張君守之與盧姻家也以其事當載於文來請且曰葑門有塘其長六七里居民稠密而上塘尤盛塘以土築土既善崩逮天雨更泥濘行者不便數年前廷玊嘗甃以石其費亦不少也乞附書之豫嘗觀於今之人凡積之厚者性必吝故好積者早夜汲汲惟其家是圖自門以外與衆共者不肯植一木甃一甎者皆是久之其財與身同於澌盡而已不然遭不肖子孫敗之至於疏財者異於是然而家益盛身益康子孫又傳之久二者於人事若相反而天道則好還有不可誣者豫識廷玊已久固知其為人其治生也無悖入之貨其待人也有周急之心及視二橋使若他吝者不以為意必至於大壞人將病涉矣至於泥途不治若無大害然行者有沾塗之苦仆跌之危亦仁人之所不忍也今廷玉不求於閭里不煩於官府一旦捐數百金為此義舉不謂之賢哉夫義舉人多為之有好名而求人知者又有求福田利益如佛氏之徒者君子皆無取焉今廷玉念其父母所謂欲報之德善繼其志者則又出於孝思不尤謂之賢哉廷玊常出粟助有司賑飢授承事郎平生義事尚多不能載豫特因守之之請為書此云重建勝安橋記夏璣蘇城西北虎丘山塘之半有橋曰勝安始於唐舊以木為之至宋端平時里人金暹易以石梁逮我國朝積嵗傾圮不堪於行正統己未巡撫文襄周公郡守况公重建以廣舊制自成化以來纍遭大水衝激日底於壞甚於往昔行者病之𢎞治己未耆民周懌郭鑑勸里中義士蔣瓊陸榮為首倡又舉夀聖住山僧圓智里人陸釗勸募朱繼等相為出資以圖重建白其事於欽差總督河道水部正郎傅公曰此王政之一事乃吾責也又請於郡伯曹公公以為宜時通府陳君長洲劉君吳邑鄺君二尹竇君又後勸諭而奬導之由是瓊等遂經始於是年三月乙酉鳩工聚石財皆民助晨夕監督不憚勞苦匠氏效力而落成於夏六月癸未髙加三尺廣十有六尺翼以欄石行者始免病涉之勞勝安之西不二里許又有橋名范店者亦病於涉公復命糧長江仁老人朱惠等成之於時逺近靡不贊頌水部公之德且謂不可無記乃築亭於橋左請豫文以刻石垂於永久則瓊等體公之心可見矣橋成公厚勞之莫不踴躍聞風興起豈曰小補噫天下之道皆然遇水而不貫者非橋梁則患於徒涉也涉水者必橋梁以相濟也橋之濟物如此况以道兼濟天下者是蓋傅公相天下之志也民知向義而樂於為善豈非善政之所致歟敬用刻石以為義者之所勸云重建渡水橋記楊循吉東洞庭峙太湖中心厥惟吳邑之重鎮民居鱗次隨髙下結屋若古桃源耕田樹果殆無寸地隙人力作耐勤苦以儉朴為事㕓陌經絡不下萬井其往來上城邑日憧憧然在途摩接無棄隂而晏處者是故道路之宜修急於通都弗可以荒逺視也具區港界二峯之間西五里曰莫釐峯東二里曰武峯其南北貫於太湖本具區也以其水恆出是故以為號焉其流廣而且急隔越行旅為必由之要津故有石梁曰渡水廢四十年矣里人慮其工巨弗敢圖駕木以濟髙危凛凛每風雨晨夕人之提携負荷過者多恐怖兢業或仆而溺有之居武峯之下者有曰前賦長吳天禬謹願人也病人之厄慨然思作之邑令鄺侯美其志白之郡守史公公大善之遣吏奬勞曰汝必亟成乃績無終懈惟汝名侯亦曰汝成豫其義汝天禬感勵益勉厥事舊石材惡弗可用盡棄之别購􅩯村之良者甃焉遂以𢎞治九年之九月告成凡長一十六丈髙二丈九尺東西為石堤延袤又各四十餘丈其費金將百挺而不吝工部姚公方督水利事亦懿而旌之然後山之人大悅弗憂於雨弗惕於夜化艱虞為坦途下視風濤不我能即歡焉咨嗟以為盛舉而今賦長吳恪周元鼎實其石以來願有書也余聞立政以澤人為大澤而不費抑又善焉若夫利害非其獨有而欲使之傾財以濟衆非勸其孰能成之於此以見是役之舉雖營於下而實出乎上以二三執政之仁而成斯人之義皆永永不可刋已其能無述乎然天禬之為是不遺其力而務廣其惠故又有餘績者三若遷傍涇之梁出之堤上而道不迂若作屋三楹其西以迓來往而客有息若浚其東之故井且亭之而暍者弗病皆其事也是宜得牽連而書余故弗敢略焉吳縣康履橋記楊循吉蘇環水而城其西曰閶門涇會者五奔流蹙束湍益急舟過輒恐由是前人鑿新河以避之而其上因有橋焉以航以塗水陸咸賴利艱在人邑政是觀先是壞且有年罔率靡興石脫幾墜為行者憂岌如也鄺侯任邱人也以名進士來令吳力官勤民百廢咸作至是得其宜修狀乃召里之謹願有力者十人俾任其事咸以為當民心開永利欣然共命則使良工伐美石易故以新實其中而飾其外非邇之圖惟久之謨而侯朝夕臨視具授以法增隆之凡二尺車馬孔宜大舟得通以其昔危今安克良於行因名之曰康履皆侯意也其經始以𢎞治八年十月僅百日工成父老咸曰自侯之來也強革弱寧四境豐晏吾人之受康多矣今也又康吾橋其能無書乎蓋衆謀方合而經生朱臣以具石告夫橋仁舉也百冗充庭而能及於是則措心邑事宜無遺焉抑以知賢牧之在上才大而餘功建義感而民力隨其澤人殆如是也是誠宜碑故述焉而以附十人者之名侯名璠字廷瑞有志康世者也兹邑其小試乎冶長涇普濟石橋記杜啓長洲縣屬里有地名野場涇其處居多大家欲重其地美其名也故易云冶長猶陳太史為相川沈氏之思賢涇然也亦足以知其民之好事易與為義矣涇逶迤若千里西首鵝湖巨浸南尾曹湖相值蓋衆水之瀦也郊原四出則為常熟崑山無錫百里間貿易耕牧吊慶醫卜往返者之所必由故有木橋名曰普濟廢已久矣陸行不通若干年𢎞治之七年居民周方等欲創為之募錢於衆得若干貫間歉錢不時集又慮藏之於私家非便白於郡而貯之官既三年嵗稍稔請錢於官時典郡者他費之且半僅給餘錢甃成橋堵自是勸募不屬塹壩阻水不通舟行者又三年既而都水郎中傅公奉敕來督三吳水利巡行至其地詢知橋事始末以為於官與民有不得不舉者存歸召知縣劉侯與議之侯曰如命究厥費數以補給之尚未敷也公又出公帑若干緡俾之盡斥舊規乃礱巨石為之命水利縣丞竇胤董之價充材備民樂趨之不兩月告成縱計一百五十尺衡一十六尺隆三十三尺上為懸虹之勢中穹兩垂影飲河流下為偃月之形洞空輪廓帆檣徑度直欄橫楯偉觀村落不誇改名以便稱謂於是諸用事者請紀石以表公績嗚呼民以義舉而幾廢於官閲歷數年公則興之侯乃承之始畢民志亦維艱哉固宜書之以示後者勸懲存焉作冶長涇普濟石橋記公名潮字曰會别號靜齋江右新喻人成化辛丑進士歷今官公勤亷恕於凡河道事畢盡心力以為民利類此橋者尤多侯名珂湖廣興國人𢎞治丙辰進士初試縣為政修整竇胤山西隰州人出身太學生奉事克謹餘用事姓名列於隂重修夾浦橋記沈燾吳號澤國諸水會於具區流而為三江以入於海水由地中行其最衝要者莫有甚於夾浦其地去郡城四十里在鮎魚口之下流衆流所經水勢迅疾舟楫不能橫截中流而渡南通閩浙北接淮揚實為漕運孔道時或烈風甚雨篙人棹卒每多告艱宋紹興初建為石橋人皆稱便橋有五空因以五星為名西納具區之水由吳淞以逹諸海奔流日夜靡有停息遂為深淵人疑其下伏蛟龍我朝宣德間一夕大風雨遂傾圮久未有復之者前巡撫工部侍郎文襄周公忱創為浮橋以代之造船一十六艘鎖以鐵繩架為浮橋上濟渡下通泄權宜無踰此制嵗久屢葺屢壞行者亦每間阻邇者都察院右副都御史瓜涇徐公源與其弟南昌經歷君澄數過此切以為憂適冬官正郎傅公潮奉勑治水乃具利害白之公臨視數四擬復建石梁謀於郡守曹君鳯仍集鄉人野老計之闊三十六丈深如五之一或又疑其成之難者乃命長洲尹劉君珂吳江尹孫君傑絡繹往返議皆如前公仰思切切有間曰得之矣無易前人成制吾但集材鼎新捐荒圖豐而已又令通判沈君溥陳君暐縣尹劉君澤復視之皆曰宜然遂增船四艘併舊凡二十選真楠募良匠俾縣丞竇君胤喻君秉協董其事自浦南迤北其維之貫之之具悉倍於前斤之構之之工咸精於昔又衡於梁者加豐厚之木繫於坼者盡鞏固之方步而履之有若平地俯而視之頓忘其險更置守者六人人有厚給寓有安居傍建屋數楹行而勞者有所憩𢎞治庚申季冬十九日橋成鄉人聚而觀之咸曰休哉不煩吾衆而漙其利而享其安其功豈小補哉爰徴文於燾刻石以昭不朽燾以為知水道者事疏濬利徒涉者建橋梁橋梁建立實有礙於疏濬之勢疏濬川澤每多略乎橋梁之舉二者將安處乎求其水道疏通而橋梁修舉並行不悖而彼此均利莫如浮橋其孰能與於此哉傳曰如智者亦行其所無事則智亦大矣是役也其庶幾乎率由美政步武芳躅不倍乎疏濬之道而得乎博濟之術則其識量宏逺夫豈晚生末學所能窺哉因序其顛末俾後之人知所考云饒稼橋記莫旦橋以饒稼名志豐年也豐年所以為生民立命也召豐年而立民命豈無自而然哉必有大德大功以㴠煦於其間而人莫之知也橋在郡城西南二十里南周村之上跨越來溪之支流左右居民務於耕稼亦有以儒為業者是以人無怠荒而俗多謹厚焉橋之創始不可考舊壘石為堍上橫以木嵗久傾摧將有厲揭之患里士盧綱欲葺之而未能也其子雍以文學受知於欽差提督水利工部郎中新喻傅公間以白焉公檄吳縣簿喻君秉詣視之君謀於大尹鄺侯璠給公錢重建而里之好義者皆樂助乃悉以石為之經始於𢎞治辛酉春三月四日落成於夏四月草又八日遂為溪山偉觀而行者便焉綱謂不可無述以詔後乃以羡財立亭於橋之北堍而以碑文見屬豫惟王政以食為首農事以時為先農事失時而欲民食足也難矣此橋之所以以饒稼名歟抑於是而竊有感焉吳於元末干戈之際淪於僣據苦於虐政尚何饒稼之望哉幸而我聖祖龍飛為中華主命將出師討張士誠空其巢穴遂以平吳為畿輔重地今百四十餘年惟見黃童白叟熙熙然耕田鑿井以樂其樂孰知上之功德所以㴠煦者如此則夫一橋雖小揭以饒稼豈不足以昭上賜而與民同樂也哉余家去橋不逺一望往來於斯習知農事今願與諸父老率其子弟從事於耒耜之間暇則誦詩書習禮義使父子慈孝兄弟友恭夫婦保守鄉里雍睦興禮讓息爭訟自然和氣薰蒸豐年可望而所謂業儒者亦將出膺時需以圖補報於盛時也夫然則是橋之建豈止免厲揭之憂而已哉公名潮字曰會今禮部尚書體齋公之弟以名進士纍今官所至俱有成績橋梁若越溪若管瀆之數處俱為重建非止是而已也謹記重修垂虹橋記錢溥成化十有七年嵗在辛丑暮春之初重修垂虹橋成橋舊名長橋在吳江縣治東三里許泄太湖所滀三郡六縣之水注三江以入於海書所謂三江既入震澤底定是也然水無所泄必有震凌之患人失其濟恆多阻溺之虞則是橋也實據兩浙八閩之衝馹使檄遞者在焉南北興販者往焉蓋要地也橋袤千有餘尺下開七十二洞跨鯨波之闊聳鰲背之峻人行其上第見洞庭諸山出沒於煙霞縹眇間而東駛諸海日夜不少息真勝境也歷嵗滋久崩隤日甚殆三之一行者病焉去年冬巡按御史髙唐劉公魁過而見之召其治縣者修之工巨費繁未易規復其邑有故義官屠晟之妻趙氏聞之撫其遺孤承宗嘆曰而父積巨資以貽汝兄弟今汝兄已歿汝安能獨保其所有邪命孫壻周禋告於縣曰幸毋黷於官毋擾於衆願自為之庶揚夫名於不隕保幼孤於有成於是縣逹於公公且喜曰以一嫠婦若此非有烈丈夫志者不能宜令縣學官禮於其門奬勵之蘇衛指揮楊端董治之周禋則稟於趙以酬應之鳩材庀工籌議克合乃出白金千餘兩經始於其冬不三月遄復其舊煥然維新衆乃請於公願立石以紀述公曰吾聞春秋常事不書此修橋亦常事也奚容書獨以彼稱丈夫者多保利蔑義雖至死不悟而趙乃能之宜書以為積而能散者之勸趙亦遣禋謝曰婦人無聞惟公巡我東吳威聲義聞自足感人而興起焉非有所為而為之也余乃嘆曰此雖一事而數善并焉公能使民以義而加夫勸人之禮趙能捨財取義而存夫保幼之仁况端與禋內外謀合上不負公之托下卒成趙之志皆得牽連書之使後之有事於斯橋者寧不視以為勸乎詩曰諸水牙湊滙成具區霪潦泛溢東海是趨輦石為梁橫亘天衢軒豁呈露罔測端倪垂虹中斷病涉艱虞繡衣使者不言自孚感兹孀婦善保其孤一揮千金惟新是圖坱圠興造廣袤範模龍翔虎伏玉砌錦鋪工甫三月雨霽虹舒勢控湖山秀敓堪輿檄奏書傳如履坦途如矢斯直曾不少迂勤召告成有永不磨重建獬豸橋銘有序吳洪吳江尹侯陳君秉鈞來蒞吾邑之三年政平而人愛悅邑衙之前有橋名州橋久圯行者病之侯乃以豐嵗勸衆有力者為之民不勞而功倐成惠於民也實多其橋名未易也成化癸卯五月六日夜風雨交作侯二鼓就寢夢神人衣冠偉然揖而進曰子為斯邑令一下車民無凍餒百廢具修是橋之建為民千祀之利也但橋名當易也吾為子告焉子嘗覽郡志乎是邑儀門舊有亭名獬豸廢久而名存子以斯亭名名橋不亦美乎侯答曰獬豸乃神羊能觸邪古人取以為御史章服之飾是邑鴻碩顯榮之多將兆於兹也神人聞之大喜而去侯覺驚異筆其説以書來京囑余銘之余邑人也知侯為詳侯以鄉貢進士除是官有清白操毅然有為人不可干志在為民省力屢遇威權不少避侯之大節不可及矣士論偉之咸以逺大望侯也况今聖天子簡賢任使凡在郡邑有異能者悉詔補侍御侯之建橋而神假夢如此固為吾邑之禎侯之超遷將先符於兹乎神之靈不妄也今特為銘以鑱諸石使后人知是橋之名由兹而立是橋之建由侯而始侯之澤兹邑將與橋同久矣肇工於成化缺年春缺月畢工於成化缺年缺月侯名堯弼缺銘曰猗歟吳江巨於吳東陳侯之來憂民若恫室家胥悅嵗屢獲豐鑿鑿白石乃建飛虹民不告勞千夫率從神乃假夢話言從容有亭獬豸載郡志中乃為神羊一角如龍無邪不觸無佞不攻易此名橋足振儒風侯乃稽首禎兆是崇橋由此名沄沄朝宗乃期是邑俊髦烈轟致身執法接武登庸孤忠直節咸躋孤公我公超擢兆先此逢神之嘉惠亦罔有窮常熟縣新建迎春橋記王宗鍚常熟縣治之東南路接崑山太倉為縣通衢舊有橋以木為之易於朽腐修理惟難自吾邑侯下車之明年政事已和即興舉廢墜凡學校城隍廟以至諸司公廨東南濟農諸倉悉為一新因念橋之頽圮行者病涉且慮木之不能久也乃易以堅石申請於今總理河道工部正郎傅公躍然曰此誠經久圖也即命以行於是召匠計之仍命義民唐政侯珮瞿旭董理其事經始於𢎞治己未六月十五日落成於十一月二十八日未幾橋即巍然煥然如長虹駕空見者驚喜橋之麓多侯姓舊名為侯家橋吾邑積嵗迎春皆從大東門地頗近北外有觀音堂甚卑隘不堪即事考之節令春從東方來非北地所宜况官吏師生糧塘里老以及通縣旄倪羣聚而觀地不容足邑侯因易以東門總收倉場即事畢經行此橋其地寬其方正父老歡呼咸曰百年因襲之弊一洗而新之遂改名迎春橋傳公又曰此盛事也不可無言以記其實邑侯與諸寮佐謂豫染指卜商之學徴言志之竊惟鄭子産以乘輿濟人於溱洧孟子譏其惠而不知為政若此橋之建舉之者邑侯也成之者傅公也二君子存公平正大之體而有紀綱法度之施所以集此數百年之事功不煦煦為人鰓鰓為惠利澤及人真可書也它如福山唐墅小山湖橋皆常熟要津舊悉傾圮侯復次第鼎新均未有記亦缺典也兹併入記中以見侯之惠澤如水行地豈特一橋一事而已哉邑侯姓楊名子器浙之慈溪人以名進士起家授知崑山髙平常熟三縣方今應召而起大用有期傅公名潮江右新喻世家奉命東南大興水利功業未量若治農官趙祥縣丞張翰楊明主簿郝尚質董資皆能贊襄惟謹亦可書矣嗚呼後之視今亦猶今之視昔繼斯邑者尚當勿替引之是為記韓氏修造橋梁道路記桑悅天下之事成於義而敗於利義之為字一而已矣視之無形求之無迹頺宇遇之巍巍翼翼曲路得之平平直直城池傾圮有之則飾廪篋落寞值之則溢我為則勇我戰則力大至為臣死忠為子死孝扶天綱立人極義其可少之耶是故事以義成不犯五刑物以義得不勞神力交以義結窶賤不絶甚矣哉天下不可無義也練川之婁溪有故家子韓君玞字良玊實魏國忠獻公之後平生讀書仗義年至六旬顧後無繼因慨然曰吾蓄之富聚之則利散之則義可不為濟人計耶顧婁溪至邑橋梁俱有未修民或病涉邑侯青城孫君璽以名進士宰本邑政通人和百廢具興兹橋心恐煩民尚未之及遂捐已資自韓涇新團涇談涇周涇新漕涇袁家涇俞項涇莊涇孫涇為橋者九俱以石易木足為久逺計共費白金數百兩又造北門城隍橋及砌婁溪街三千丈皆垂成初橋既成孫侯申文欽差工部郎中傅公潮大加嘆賞批答有云一毫不拔慨世俗之可憎九橋連修覩斯人之獨異又曰與其厚之以幣孰若華之以文用旌尚義之賢并作守錢之戒令侯備綵帳俾縣學教諭周成彰之以詞并侑以羊尊侯親下其廬鼓樂前導輿從塞塗光輝滿路里巷之士無不榮之夫橋之成道路之修使出於官所損不知幾家所刑不知幾人良玉以獨力成之於鄉之人前無損而後有益是豈易得也耶夫藏經有曰積財不施者自已無分五家子有分今良玉以五家之物為萬民之利所得不既多乎良玉素以乏嗣為憂橋功之就即産一佳兒名錫有符孫侯昔日奬諭之言他日見之成立而閲諸橋或期駟馬之過或詠青龍之現必有待也豫以文字為職業因為記其事即可勒之於石以垂永久長洲縣重建官瀆朱涇二橋記都穆工部郎中新喻傅公以朝命蒞吳水利於兹三年凡政之可以利民而行逺者公悉心為之罔憚勞瘁而州縣亦奉令惟謹莫之敢後公嘗謂橋梁者水利之首務惟長洲官瀆朱涇二橋在郡東北舊𨽻於縣實當要衝嵗久傾壞以為此而弗修則行者病而水道壅非所以為政也乃出在公之銀以為之倡而縣民馬璘曹源等復樂助焉公命縣丞竇君胤専董斯役撤其舊而一新之經始於𢎞治庚申秋八月至辛酉春二月而工告完官瀆舊修十有五尋崇三尋有四尺廣減崇之二朱涇舊修八尋有四尺崇不及二尋廣減崇過半今視舊咸崇三尺廣倍之而洞其下者亦然事雖董於所司趨於小民而所以規畫之者大抵皆出乎公是故成之之易而其堅厚雄偉則又可以久逺而非利於一時者也穆嘗稽之郡志橋梁之盛唐稱三百有五十以今視之其數蓋不止是但舊之司水利者皆州縣之佐官無專員其任弗隆往往墜廢自如而水旱迭患邇年以來蒞以廷臣由是其事始重而况忠勤諒直如公者哉是舉也官不知費民不告勞而徒者舟者莫不感嘆謂公之愛民如此而水道之通誠有藉焉公之惠不其博哉竇君俾穆為記將刻諸石示不忘公之功穆吳人也蓋嘗受公之知而目覩其事故敢執筆而記之公名潮字曰會由甲科進士典內翰而至今官政事文學與其兄大宗伯體齋先生齊名於時吳郡溪瀆三橋記陳霽吳郡橫山之麓震澤之濆厮流溉壤以通舟楫陸途四逹故多橋其東屬吳江為越來溪春秋時越伐吳兵從之入故名南距澤水二百里為越地兹實吳之故陲也橋曰溪橋溪之支流為筆港修直如筆取象類也橋曰饒稼其南屬吳為管瀆因以名橋襟山帶澤厥維要區饒稼舊為木梁朽折且盡溪瀆皆石為之圮甚墮石刺水中巨石危欹嶪嶪欲崩徒者却顧脅息趨而過舟行者望而憂之經其下驚悸凛汗回視皆相賀或不憚迂路繞出之蓋三橋之弗葺先後數年矣尚書工部都水郎中新喻傅公奉璽書督水利於三吳興廢疏滯巨細覃舉既二年行郡經澤中臨視兹土集耆老問狀曰是葺之晚其加崇乎然毋勞爾民下屬邑理其役發帑鳩工伐石聚材民爭趨之隄塹借作工用次舉繕危以安代木以石拓舊規新髙廣有加焉靡公私錢十有八萬役夫千人始作於𢎞治辛酉春三月成於其冬之十月綜其事者吳令鄺君璠判簿喻君秉吳江令劉君澤邑丞于君旺竣事諸吏民謀曰公惠民深矣兹一役也功倍而利博廢而克完亟而弗勞不有述也其奚考引公德以詔於後乃相與來請為列其事以書於石吳邑重建永安諸橋記浦應祥吳為蘇之首邑而蘇實古都會覽周職方延連三江浸滙五湖其波流衝射為濠為塹為溪為瀆為津港為陂塘者難以數計苟可以通舟楫處必資橋梁以利涉焉故橋之為數考之地志城內官橋凡三百九十自其郭外言之則所謂徒杠輿梁者奚翅數倍也承平百年來多所傾圯行者病涉間有好義者欲修葺而作新之視上之人無有以勸相而倡率之遂至於廢墜而不舉良可惜也𢎞治己未工部郎中新喻傅公奉勑總督江南水利來蘇治水之餘令曰橋梁道路利於民者不細乃檄有司出公帑為倡而民之好施樂助者聽一時要津孔道窮陬僻隅朱欄碧甃罔不聿新誠盛舉也兹者自胥門之西二十里許至木瀆為橋者三曰永安永濟永福自木瀆之東南不數里許有塘曰福興為橋者四咸𨽻是邑公爰咨邑令鄺侯璠勸農簿喻君秉躬董其役卑者崇之狹者廣之傾者完圯者固上可以通車輿下可以通巨艦信久逺之良圖而非直目前之美觀也其所以利於民者誠溥且博矣公蒞政三載將復明天子命鄉之民被公之利澤者胥謂豫曰公之德政施於他方者咸有名筆以記公之盛今公去為明天子留而不復至也則公之休美施及吾鄉者嵗月流邁能不有所遺亡乎吾輩敢礱礪堅珉請執事文於上庸以樹於通衢以昭示於來者執事無靳焉豫是其請遂不辭而書之橋凡有七其徒庸材用髙廣尋丈與夫施財丕作之里民姓氏當别敘於碑隂故於此而略歸普二涇通水建橋記楊循吉蘇之郭惟西為盛而吳實司之有水焉來自太湖引大濠而别注者南曰歸涇北流三里至途而止北曰普安涇南流亦三里至田而止中隔小溪涉不及膝村氓以資浣濯灌溉莫之能貫焉𢎞治辛酉胥門浮橋興邑令任邱鄺侯相水至斯嘆曰噫是固有别津而人不知也決途鑿田其克有濟乎於時巡按侍御長沙袁公方祇奉命孜孜治道郡侯汝寧曹公盡力民事尤敦惠愛侯具以請皆慨然許可侯乃集地之耆年而敏事者語以故咸曰兹川湮塞且數百年今故形具在龎眉之老思復其舊而不可得大夫有意吾儕其何幸則又諭田者俾售之果以地獻涓日斫土庶民子來不旬月功告成凡用役一千開地四十丈而南壅之決於一日者不與焉沿流而行又隨在疏剔其遇地之侵官而屋其上者必斥無貸豪強共命惟恐後伐樹祛藴洞為流波一望洋洋靡有阻遏於是鼓楫而過者無虛晷臨流而宇者競厥居黎庶相慶胥來聚觀若天造地設理固有定而適成乎今也方役之始侯欲廣渠容巨艦慮匪卑梁可納乃作十橋跨其上在北者首普安領其五曰昌祿夀安永福積善富民在南者首歸涇領其三曰通惠彰盛豐利七之用石三之用木率取隆顯壯於里㕓朱闌緑波照映逺近級以備雨徒者便之然後鄉人以為舟之出是有二美焉胥不能沮閶不能險是民志也乃謀伐石書偉功謂愚居與水邇宜不得辭愚惟物鬱則思通然必遭而後濟功成則不朽然必協而後克觀之斯渠昔否今亨脈於大川其不有遭乎上下一心以建厥勛其不謂協乎雖然由是以求執政之賢不可以不志闕持法而憲體振惟郡侯公以廉闕惟令侯承之以勤能潔修而邑闕安堵樂業熙熙乎無所不遂也闕一時餘事流澤布庥而亦垂之闕而荷通物之任乘建功之機既闕哉是以敢筆其詳以示於後世闕吳中金石新編卷四
