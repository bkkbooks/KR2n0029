body:
  text: 吳中金石新編卷七明陳暐編雜紀文正書院記祝皓書院在蘇城中吳縣西隅通衢之上祀宋大賢范公之祠也按范之先世自北徙南而居於吳公生於武寧官舍長仕中朝而薨於徐子孫奉其柩葬河南萬安山而祠於是者以公父母之邦且其地本范氏舊業公嘗經理作義莊以贍宗族者也當宋咸淳丙戌太守潛説友始請於朝立專祠祀公元末至正甲戌郡守吳秉彛又奏改為書院而以公之贈諡表其門閭舉其族之嫡嗣主奉祠事義莊田宅悉附天平山三太師墓所逮際昌朝大新禮制遂以書院登諸祀典春秋祭享郡之官屬師生與其族之子姓咸集祠下行禮著為定規彰彰詳備可謂盛矣然自國初至今百有餘年而祠宇室堂日入於壞時雖修治而功費浩穰率未能完美如舊今主奉從規與其族人屢欲經營顧力弗逮所賴郡守劉侯為之規畫又值嵗祲公私多故未克就緒適監察御史劉公持節按臨爰自下車洞燭幽隱發姦摘伏而下無遁情洗寃滌滯而犴無留獄且不翕翕希同矯矯務異數加延訪以革猜防故政不迷而廢墜畢舉於是郡守得以祠事白公公曰事神治民敦崇風化郡邑首務有或不然非憲體所當究乎夫事有經權時有可否貴在變通使無偏廢可也矧先賢祠宇風化所關宜亟行之勿怠吾亦為之處焉用是親詣祠中纎悉畢視默運𡨕思酌量措置悉付長洲縣令劉輝典史張灝董之而責其成令亷慎老成謹於趨事曽未逾時凡祠之敝者一撤而新之言言赫赫加於舊觀邦之士庶來瞻來仰靡不驚歎而莫究所繇蓋是圗也材給於上而官不加費力役於下而民不告勞神享其成而族賴以芘一舉而衆美悉具非善於謀敏於事而公於心者未易臻此衆方落成會監察御史戴公巡歷至郡詣祠見之極加稱賞曰盛事也不可無紀於是令與主奉數過丘園以記為請豫惟文正公之髙風大節彌兩間而冠百世者登諸國史載諸郡乘而雜出於譜傳紛播於品題者不可勝書至今庸人孺子一聞公名皆知敬仰故其平生所至存有生祠沒有廟祀者不約而同於以見秉彛好德之誠不以古今彼此而有間也况公父母之邦精神手澤所在則凡生於斯仕於斯者有不加之意乎是宜賢監司良守令之用情於是也第皓晚生末學淺見寡聞不能加毫末以光盛事為歉然嘗聞之記者取記其事實信今傳後不失其真乃可故敢原其始末略其彌文而為之直書云侍御公名魁字士元髙唐人戴公名仁字以德句容人郡侯名瑀字汝器蠡吾人皆以進士歷顯榮所至有聲不係諸此不書新修道山亭記黎擴蘇為南圻大郡其學制之雄麗池圃之幽邃尤為江南諸學之冠尊經閣西數步有小丘焉隆然而起髙約四五丈廣約畝有畸其趾三方浸以大池意其初必因鑿池纍土而成殆有類乎道家所謂蓬萊方壺者故名之曰道山繞山上下羅植松柏雜木隂鬱森聳干雲蔽日登其巔可以盡得一城內外之景也國朝宣德間南昌况公鍾受勑知蘇始作亭於上四隅之柱以石四面之忩以魫深廣各二十尺崇比廣而減四之一焉翼然竒偉之觀師生於勤學之隙得為遊息之所後將三十年亭日就壞雖更數守咸莫介意幸而去年夏得四明姚公堂恭承上命來守是邦蒞學勸課之餘乃登斯亭俯仰低徊而嘆曰前人之迹可坐視其廢矧有益於師生紓勞釋瘁者乎於是捐已俸市羣材易腐以堅補缺以完加以藻繪題以華扁既訖厥功焕乎其改觀矣公與二三僚從登於其上第見天光雲影相蕩於上下官府民居仙宫佛剎相簇於逺近至於吳山震澤之幽且逈者莫不盡在乎目睫間矣公欣然以謂衆曰是可樂也宜有以記之惟兹學初由宋大賢范文正公仲淹捨所得錢氏之地而建然文正之素志在於先後天下憂樂之言而我姚公生於數百載之下慕文正之風於數百載之前果諧所慕得典文正之鄉郡能不以其素志之言見諸實行而肯托之一空哉且前此數嵗水旱相仍飢饉薦臻蘇民之生鮮遂公雖欲修斯亭覽斯景以樂斯樂不可得也幸今聖天子在位斂福錫民年榖豐登民生大遂公安得不修於斯覽於斯以樂於斯乎且公之樂於斯者非獨一已之樂也蓋將以同乎斯民之樂也不過托斯亭以發之爾又何戾於文正之所言者耶嗚呼地因人顯名以事傳而今而後滁之豐樂岐之喜雨又不得專美於前也用是為記以鑱諸石俾蘇之後人得有所考亦有所思云長洲練氏義孰記宋濂皇上建大號之八年以為天下既已安輯而化民善俗之道猶有未備乃下詔郡縣凡閭里皆啓孰立師守令以時程督之於是雖窮鄉陋壤莫不有學吳郡長洲縣之尹山民居繁庶習俗嗜利久不知教有司偶遺不舉大姓練則成自謂其父文逹由睦來居嘗有志而未果今明詔如此而孰不時立恐非朝廷淑斯民意乃與弟箎謀夷土治材作堂三楹間以為講習之所旁為四室以供寢處庖湢延儒士髙平范煥為師俾里中子弟就學焉割田三十畝以食之始於洪武十一年正月越七月而後成具以其狀白於縣若郡郡許以為宜遂乃遣書來請文紀成績古之為治者其法雖詳然不越乎養與教而已養失其道則民貧教失其道則民暴貧則流而為盜暴則去而為邪二者皆亂之始也是以先王重之二十五家之閭必有左右孰孰必有師師必以仕而老於家者為之故是時無不學之民無無孰之地無邪僻淫靡之俗刑法置而不用亂亡無所自而起其後強大諸侯欲圗得志相與毁詩書六藝之籍使其教壞而不行然尚踰數百年而後絶一民不忍叛其上教之足以感人若是自秦以降無教者亡有教者存得其道者盛以延失其道者衰以促千載一軌也皇上奮然愍前代之弊欲使海內之民皆霑沐禮義大設學舍以教之此與先王之心何異則成非有化民之責乃能以淑其閭里是圗豈非君子哉君子之所為貴乎可法於世他日三吳巨族人人皆奉上設教之意以化其閭巷之民使咸知尚禮義恥犯法如成周時蓋將始於今乎姑刻其事以俟大場鎮重修義孰記王直大場鎮在嘉定縣東南六十里元有義孰邑士沈文輝所建中為殿以祀先聖四配十哲侍焉其諸賢像則圗於兩廡之壁有堂有室以為師弟子講肄之所其制一倣縣庠而差小割田千畝收其租以供祭祀飲膳之費謂之義孰蓋當時所賜名而趙文敏公題其榜揭文安公為文勒之碑入國朝來田歸於有司師生無所仰給講肄遂廢迄今七十餘年殿堂門廡日入於壞會朝命下興社學民居有逺於郡縣學子弟無所受業者俾學於其中而大場鎮當有所建置於是里之士人沈軒以故義孰白於縣丞張鑑欲修葺之以教里中子弟而力有不逮時工部侍郎廬陵周公巡撫諸郡毅然以興學教人為務鑑乃為書請於公公為屬之邑令扆昭及丞俞觀等俾協力治之昭嘗為監察御史亦篤意教事經營規畫市材命工修大成殿三間明倫堂五間兩廡各十二間儀門如堂之數以正統八年八月興工越月而落成壯麗宏偉焕然一新里中子弟得受教於此而頌周公之德與賢令丞之功不置鑑復與衆謀曰是役也非巡撫大人之力不至是其嘉惠學者厚矣不可無記以示久逺乃因長洲縣學教諭蕭彥清求豫為記古者二十五家為里里必有門門之左右為孰里之仕而歸者大夫為父師士為少師主其教嵗功方興凡弟子皆出學傅農事則父師少師旦暮坐孰中教之以孝弟忠信恭敬遜讓嵗事既畢則皆入學年十五入小學見小節踐小義焉十八入大學見大節踐大義焉其秀異者則以次而進用之今家於是鎮者纍百計非止於二十五為弟子者衆矣且其人多秀而喜文皆不以農為業頗得專志以讀書則學乎此者其成功當易於古人然豫聞之師者教之本也孰既新矣將欲成賢才美風俗以稱修孰之意於師可不慎哉今縱不得致仕之老者亦必求夫德成行修之士為之師使凡學者自灑掃應對進退之節禮樂射御書數之文以至修身齊家治國平天下之道皆深究而力行積中而發外蔚乎其有文卓乎其有立始而為閭里之榮終而為邦家之光則於斯孰可無負矣初沈文輝之為此凡教養之資皆其所自出此義舉也故名曰義孰今猶為此名者周公以為興學以教人與人之勉於學皆理之所宜為不可緩也故云然然則為師弟子者其可佚居慢遊而已哉張節婦唐氏旌門銘有序宋濂皇帝恭膺天命誕敷文教凡有繫於民彛者輒加旌寵即書所謂表厥宅里樹之風聲者也粵自洪武七年春三月姑蘇守臣某上言吳縣編氓張成妻唐氏妙堅生二子而成卒堅年二十有七乃忍貧鞠育指天自誓曰飛鴻尚不再偶况於人耶遂不施膏沐日處寒燈敗帷中或憐之欲奪其志每涕泣以辭今五十有七二子頗有所成立州里稱之無異辭者里耆某言其狀於縣縣上於府監察御史加覆核焉咸謂得表署其如制今臣故昧死上中書以聞制曰可於是符下有司行事四方來觀莫不歆艷其子彥存竊以為龍光自天照耀下土不可無以宣布上德以昭示悠久請大都督府照磨馬嗣能徴濂著銘鑱諸樂石濂惟夫為婦天大倫之攸繫故士昏禮有云下逹納采用鴈釋者曰取其不再偶也蓋有夫婦而後有父子有父子而後有君臣夫婦之道貞而天下可得而治矣聖王在御持化機而制六合褒加貞節所以化行四方作新斯民者也濂待罪國史法當備載其事復繫之以銘銘曰聖人御極惇敘天彞𢎞敷大訓隂執其機樹之風聲何物不動管攝人心邇赴遐聳有婦氏唐來歸於張克産二雛其夫乃亡泣淚既盡繼之以血相隨九泉乃我之節嗷嗷者雛匪親孰依忍死鞠之心惟天知寒颸蕭蕭青燈在壁月落參橫猶聞夜織或憐其孤風其改圗豈無甘薺何忍茹荼含涕陳辭鴻不再匹人為物靈顧弗之敵厥子既長頭角嶄然苦節之亨由持之堅牧守上言請加褒錫帝曰俞哉朕豈汝惜烏頭雙表有巋者門銀板漆書其光焞焞皇匪爾私用為世勸推以逹之民罔不變子則盡孝臣宜竭忠三綱既建比屋可封太史作銘勒諸樂石奉揚鴻休以昭罔極節婦黃氏旌門頌蘇伯衡姑蘇吳縣之閶門里有旌門焉朝廷所以寵褒姚節婦者也節婦姓黃氏名妙清歸姚氏為諱榮之妻生男女各一人而榮以病卒榮卒時節婦年二十有九子文聰才二嵗貧甚力紡績以俯育或勸其更嫁節婦曰夫死不嫁婦人之常况有子可從何為而更嫁此足一移我則匪人不聽後十二年張士誠入據姑蘇亂兵掠文聰以去數從人問消息比二年不聞問或曰異日者有子可謂無更嫁也今子俘矣無論死藉令生歸亦不可望不嫁將焉恃乎節婦曰我豈以子存子亡為去留者哉終不聽又四年文聰始脫身來歸節婦驚喜且泣曰姚氏有後矣我死亦無憾後八年里耆列其狀上於縣若府監察御史為察實以聞制下旌其門為節婦之門則洪武七年春三月也今節婦婺居且三十四年年已六十有三文聰愳無以侈上賜而昭示罔極聞伯衡嘗簉屬太史氏介朱恪即金華山中求書其事勒諸樂石伯衡惟唐虞三代之世其教既明其化既成其民俗之美至於比屋可封當是之時旌其門閭表厥宅里猶不敢緩然則所謂樹之風聲使民益勸於善雖唐虞三代之聖人猶不能不以之為務也况當世降俗漓之後有天下者不善其善以為勸奚可哉皇帝受天景命君臨萬邦凡有係於風化者輒加表異蓋以此也而姚榮妻黃以貞節著聞蒙被寵褒如此是猶唐虞三代之民加唐虞三代之令典矣逺近聞之其誰不感慕而興起此所謂賞一而勸百者也不其休哉不其休哉夫推明聖意而播諸聲詩者史氏之職也因不辭而為之頌頌曰天眷聖神民君民師匪曰治民亦欲迪之聖神奉天式和民則隂握化權作新萬國褒嘉節義錫以旌書風行四表孰不奔趨非有輨轄自率規矩四維既張五倫攸敘吳縣有婦姚妻氏黃年二十九良人遽亡儲無儋石室若懸磬母子煢煢相依為命霜風凄其落月照帷間關機杼影與形隨人或憐之勸之他適胡乃茹荼有薺如蜜慷慨自誓辭與涕俱可以人焉而犬彘如我不即死我志靡它我下從夫我子如何子未成童掠於亂兵倚閭而望寒暑再更僉曰已矣安知非死無子焉恃不嫁奚俟婦曰咈哉何言之卑我志可易泰山可墮泰山可墮我志不易仰天一慟血淚雨集時既寧謐子亦生還雖無甘旨志養攸全郡守御史交謂宜褒乃具封章乃請於朝乃被綸音旌其閭里苦節之報庶其在是昔視其門門則以席今過其門門有棹楔棹楔巍巍龍光有耀匪爾之私俾世視效嗟臣事君猶婦從夫凡百在位曷鑒曷圗婦道不虧尚軫聖意臣節殫竭有不寵異刻辭堅珉以昭鴻恩以揚清芬以詔後昆朱孝子旌門記吳寬論天下户口莫庶於蘇郡者夫十室之邑必有忠信而况於郡之大者乎今朝廷有大慶頒恩詔輒令有司具節孝者來上然自建國以來凡百餘年蘇郡節婦嵗有之何孝子之寥寥耶豈其行為難人鮮能舉邪其見於公牘者洪武間有張孝子一人可謂少矣至成化間又得朱孝子一人乃乙未嵗旌門之典下士大夫為文詞以表揚之者不一而足於是朱孝子之名播在人口余因疑郡中孝子固多彼窮居僻處者特無人為表揚之耳如張孝子非託之公牘其名亦已亡矣此可見文詞之有用也朱孝子為人與其名字里居見山西參政祝公傳已詳其年將八十康健不衰比嵗凡孝子詔賜仕服榮身適預焉其葬父後嘗廬墓上豫既為作聽烏軒記今其子存理持旌門銘頌詩賦數十篇至都下見示又欲得豫言為記蓋知文詞之有用惟恐其父之名不傳亦其孝也東莊記季東陽蘇之地多水葑門之內吳翁之東莊在焉菱濠匯其東西溪帶其西兩港旁逹皆可舟而至也由凳橋而入則為稻畦折而南為桑園又西為果園又南為菜圃又東為振衣岡又南西為折桂橋由艇子濱而入則為麥丘由荷花灣而入則為竹田區分絡貫其廣六十畝而作堂其中曰續古之堂庵曰拙修之庵軒曰耕息之軒又作亭於南池曰知樂之亭亭成而莊之事始備總名之曰東莊因自號曰東莊翁莊之為吳氏居數世矣由元季逮於國初鄰之死徙者十八九而吳巋然獨存翁少喪其先君子徙而西既及重念先業不敢廢嵗拓時葺謹其封濬課其耕藝而時作息焉翁仲子原博以狀元及第入翰林為修撰獲以其官封翁朝士與修撰君遊者聞翁賢多為東莊之詩詩成而莊之名益著修撰君以謂豫曰幸吾子之識之也夫人之業未有不勤成而侈廢者翁之為東莊也承往敝而修之􅈤悃劬瘁歷數十年然後備亦既囏矣而翁又遵道畏法雖處貴富泊然與韋布者類則所以保其業者豈苟然哉易曰幹父之蠱有子考無咎厲終吉由是觀之翁之業雖百世可知也又聞翁積而能散衣寒食餓汲汲若不暇則兹莊也寧直以自樂為燕遊而已今修撰君科甲重朝廷文章望天下愛民憂國恆存乎心而見乎眉睫則推翁之心以逹之天下又豈直足以保其私業為兹莊山水之重而已耶然君子論家業之艱考世德之有歸信文獻之不可無者必自兹莊始作東莊記吳中金石新編卷七
