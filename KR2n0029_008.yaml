body:
  text: 吳中金石新編卷八明陳暐編雜記雲巖雅集志徐有貞天全翁自永昌歸吳三載於兹矣閉門却掃非湖山之遊不出出則孤蓬短棹飄然往翛然還而未嘗有同遊同樂者甲申秋九月上日自在居士之自玉峯來也始相約為登髙之集約所登曰山之近而佳者則武丘之雲巖乎約所集曰凡吾詩社中人皆可也然不必期翌旦至者即與及旦而鹿冠道人自東原至愛雲道人自牆東至醒菴未菴兩文學至自緑水園翁乃與之載酒殽出閶門追及居士於畫舫而長沙慕賓繼至遂即舫中張宴為水嬉望山而進日卓午乃至而吾七人皆古衣冠步自山門笑詠以登巖緇野褐􅌓眙相視迎而導之自麓及巔凡臺殿亭館之有名者畢造焉既乃遵鶴澗過松菴循劍池隮雲閣列席而飲用司馬公真率㑹例酒至自斟杯行無算於時黃花方盛開采英浮白薦以紫萸緑橘而山珍海錯間之每酒行三五巡則一瀹以茗故雖酣而不醉醉而不亂間起而延佇巖阿慿軒以眺邇而千章之松萬竿之竹雲作之色風作之聲海濤怒鼓天籟和鳴目眩耳聳應接不暇逺而陽華諸山自乾而離陳列車連衡絶乎莽蒼之野具區之浸自坤而巽匯乎三江極乎雲海之涯坱圠混茫與天無際使人神爽飛越將與造化上下同流而無間者因相與尋勾吳之遺迹弔闔閭之𤣥宫慕泰伯之至德企延陵之髙風嗟霸圗之易泯而知有道者之無窮也居士乃倡為四韻之詩鹿冠繼之兩文學繼之愛雲長沙又繼之而翁則旅酬而遍和之於是六人者齊起舉爵以屬翁曰古今人率以菊節登髙登髙必以詩酒為樂事然能兼之者鮮矣孟參軍之於龍山有酒無詩陶徴士之於栗里有詩無酒老杜之於藍田小杜之於齊山有詩有酒而無屬和之什且彼晉唐中季人亂日滋其皆不能無憂而我輩幸當太平之世以時游衍而兼有詩酒賡酬之樂然則斯集之雅蓋前此所未有也不可以不志翁乃起而謝曰然哉吾聞君子而有道也其憂以人其樂以天未聞以詩酒也以詩酒為樂者世之流連光景者所為耳君子而樂乎詩酒雖時有之豈其心哉是故居廟堂而憂民處江湖而憂君以人而然也簞瓢陋巷而樂不改蔬食水飲而樂在中以天而然也以人者有時而不樂以天者無往而不樂若夫居士優老而歸幕賓從宦伊始鹿冠愛雲嘉遁丘園兩文學表儀鄉校蓋有樂而無憂者顧吾獨以戅直忤時涉難幾危於人而幸全於天其憂以人者不可勝言矣而樂於天者亦未嘗不泰然而自得也乃復恭承先帝今上之恩賜之環命之服優游田里去危就安時從諸名勝之遊何幸如之何樂如之夫食飲者其得味同而飢渴者若加㫖焉今吾從諸君之遊亦猶是已敢不如語志之居士為玉峯夏仲昭其仕歷踐清華以太常卿致政詔進階二品鹿冠為京兆杜用嘉愛雲為吳興施堯卿醒菴未菴皆陳氏故太史怡菴先生之子仲為孟賢季為孟英長沙為彭城劉廣洋故大司成假菴先生次子也太湖諸山記王鏊太湖之山七十二其巍然雄峙起伏於東西兩洞庭其偃然橫絶而北首者馬跡自西而南逶迤明滅於天際者衝漫橫三山此皆有居民村市里巷多橘柚茶椒桑梓之利東洞庭之東雲水明麗望之若斷而聫者武山其北穹然若立碑者石牌突然而贅出者餘山其西首鋭而末岐者箭浮若屋而欹者王舍王舍之南為苧浮有若棄箉於水者大箉小箉有若籃入水其耳可見者驚籃有若馳於前後追而及之者猫鼠有若船者浮山橫絶西南者三山三山之南為澤山厥山西洞庭之北有若隆然而曝水次者黿山山多石可碑又北為長沙又北為葉餘有若石笋嶻嶭對立者玉柱稍却者金庭有若飛而欲集者南烏既集而啄者北烏二女娟好背而立者謝姑其南為峐山若人戴笠者帽山若房者舍山五峯並起若不相伏者五浮若五浮而少二者筆格驤首掉尾勢欲逝者石蛇若螺者青浮其西大雷北小雷世傳二雷相近而不相見見風雷作小雷之北㸃㸃水面若人者若禽者若馬驟者若器浮者為大小竹東西獄衣杵疃浮隂山橫山紹山大干小干若琴者為琴山衝漫之北若沉若浮為厥浮殿浮白浮又北為大貢小貢又北為茅浮若五星參錯五石浮又北為思夫山馬跡東可十里為杜圻南夫椒夫差敗越處也與夫椒對峙而差小者小椒西北錢堆有峩冠立者獨山若二屼可憑者大屼小屼若雙鳬欲止者二鴨若老人磬折相向者大墮小墮然其最大而名者兩洞庭也游林屋洞詩序王鏊包山之西有洞焉曰林屋廣可坐數十人石皆谽谺中空紺碧深翠夏則涼冬則燠雨入則晴晴則隂森若欲雨者正東有石橫道匍匐可入入則豁然大明行數里有石牀石鉦金庭玉柱柱之上有字曰隔凡相傳吳王嘗遣人窮其境數日乃出宣州世莫知其然不而故武功伯徐公嘗至玉柱之側見隔凡字云𢎞治十三年三月水部郎中傅君曰㑹以治水至山中公暇約豫同遊豫以治任北上不及偕君游之明日以詩寄豫曰竒矣竒矣乃作亭於洞之口使游者憩焉豫生長山之東於所謂林屋洞者嘗一至其處其於所謂隔凡者志欲一詣焉以驗其然不而竟未之能也物有近而難至者豈謂是歟聊因傅君之游和其詩併鑱之亭上云隔凡深處禹書存尚有神靈為守門穴底玉泉流作汞巖前璧月過留痕燕飛尚驗晴為雨龍戰猶疑數應坤聞說遙遙天漢接胸中雲夢不須吞廉石記吳寬石之産於吳者竒形怪狀不可盡述良工采之好事者賞之君子則藐之於此有石焉頑然數尺重而不竒蠢而不怪盡山中皆是物也良工棄之好事者藐之君子則賞之豈徒賞之又從而貴之敬之視其物殆與魯璜秦璧等非物也人也蓋當漢末吳郡陸公績仕於孫氏為鬱林太守相傳泛海歸吳舟輕恐覆取巨石為裝蓋其廉如此公家婁門之內臨頓里之北石留民家至今猶存而埋沒土中僅露其背過者猶能指而稱之曰此漢陸公鬱林石也然未有表識之者今監察御史胙城樊君祉巡按吳中聞而美之謂知府史侯簡曰先哲遺物固宜表識且有可以風厲乎人者在顧其石僻在東城非官吏朝夕屬目之所其為埋沒等耳吾將有以置而立之侯以為然於是吳縣知縣鄺璠長洲縣丞王倫相與督役夫曵至察院之側作亭覆之而樊君為名之曰廉石石始僻而通久湮而顯觀者閧然足跡不絶皆曰古之才御史必以揚清為事樊君此舉雖去之千四百年之人猶且揚之况其近者乎且御史之職在乎舉賢舉賢者可以激勸乎一時石之不朽雖至於千萬年可也其有功於風紀甚大且久惟昔南中有貪泉焉飲之者見寶貨以兩手攫而懷之物之能移人心如此今之廉石正與此戾自兹以往凡過而視之者其廉士固欣然摩挲愛玩以益勵其操若夫貪者將俯首赧顔趨而過之有不動心而改行者尚得為人類也乎石之立為𢎞治丙辰四月二日越月而亭成樊君既題其楣曰漢鬱林太守陸公廉石復别琢石請豫為記豫美其事故諾而助成之遊石湖記朱逢吉姑蘇之西不一舍而近有石湖可千餘頃岸左右皆居人雜植桃栁梅竹其下匝水率蒲荷菱芡之屬中涵澄波猶氷鑑然沙鳥風帆出沒往來無虛時具區橫其南良田沃壤綿其東越來溪絡其北層巒叠巘環其西背具區行數十里至湖西而止峙為三峯盤旋如蓋由山麓抵絶頂可三里晉支遁嘗棲其上唐因建梵宇曰楞伽後立浮屠岌岌撑太虛若欲飛動前闢小殿列為神像者五自前代時城內外暨村落百餘里間男女稚耋當春夏月逺近各相率舟行載酒殽雜樂戲具徒行乘馬驢竹兜競以壺榼食器自隨或登岸以樂神日肩摩跡接畢則宴遊以樂太平逮今如之今年春正月余奉詔理水是郡偕吳縣判簿濟陽江君率民循行田間築堤防疏壅障遏奔激夙夜從事罔敢怠舟常過之未暇一登覽二月既望行次湖上適以風波遂輟棹登岸君曰今省農幸周水之汨田他鄉者已漸縮惟濱湖斂否莫覩盍相與憑髙覽之遂登峯之巔四顧其下田向所謂溺者蒼翠覆阡陌井井乃矚吳西羣山如穹窿靈巖如天平陽山薦福如獅子橫山黃山吳山小者離離如青鬟螺髻髙者列翠屏參差出烟樹杪湖波瑩然在足底殆天啓畫圗信為遊樂之境餘所莫及抵暮寺主僧德啓倒屣出翠微亭延觀雙泠泉掃榻以宿時治平僧清渭先在坐焚香煮茗相與清話翌旦下山復歷諸村墟若木瀆若光福若橫金及過具區登包山督促成農功於是堤之圯者整頺者立坎者夷水以車力入於湖溪田野漸復故修禊日舟過湖濱入治平精舍值僧渭松隂中相與尚羊觀吳之冽泉及深沙神池泉池所甃石已撤毁所存潢潦一窪而已遂縱步登中第二峯披蓁蕪攝衣以上可三百武其顛方整若印故老相傳吳王夫差嘗即此為祀天之所俗因呼拜郊臺外繚崇垣循湖堤坡陀起伏如昔向有寶積寺居其麓今叢荆野蔓悉莽為狐鼠之墟興廢不常無足慨者獨其北第三峯未登翌日老僧净日直其舍後剃荒穢取道叢篁曲折間攀援而上殆數十尋峰頂狀如磨故名茶磨山當石窽中出泉一泓不溢不涸甚清冽可愛峯之北下瞰湖尾瀦為蓮花陂山之環拱騰蛟翥鳯至湖以峙者竒秀萃此峯誠為吳中冠治平寺獨當之峯左則枕湖有二橋聨絡東曰越城西曰行春其旁有亭宇俯臨湖波乃即樵徑﨑嶇而下入面湖佛祠祠裂巨石鑿巖洞幽邃清絶雜樹隂翳樛枝交其上巖下泉一池黝碧深百尺許魚洋洋遊其中飛石梁其上踰數仞過此而北巖中立石斫大士像前為小軒尤竒因少憩俄見樹杪懸一蛇可三四尺色蒼碧初疑為蔓童子以礫擲之輒昂首空中騰及他枝而去老僧以為異云至亭下有碑刻石湖二字字盈尺其兩間璽文一曰御書之寶小字三曰賜成大具有表文乃知宋人范成大當孝宗朝為參政乞歸老石湖故有是賜表則其上謝者按蘇州志載公以文學政事著名其歸老於斯園堂亭榭遊樂之所非一湖因之以稱今遺趾漫不可考獨湖北數里山曰天平文正公祠猶存今四百年山林蓊蔚如故所置義莊子孫䝉其澤未窮是知君子惟道德為永世之本山水未足云然古明逹士遊覽所至必紀其見聞所以益智識今余老而無學於格物致知之道不敢不勉故記丹井銘宋濂海虞有虞山梁天監初漢天師十二代孫張道裕來隱其下建招真之館鑿丹井焉宋淳熙中道士李則正浚井得藏丹石碱啓之化為雙紅鴿飛入上湖至今湖中丹光煜煜然邇年井且廢莫知其所周尊師𤣥真窮日力尋獲之重加以甓作亭覆其上時皇明洪武元年也然仙家錬丹必以井故名山多有之其在今海虞者舊廢而新治豈𤣥學復興之徴歟銘曰太隂委精自天一融而為液養萬物神丹浴之赤如日有夫𤣥巾發我室雙禽衝霞飛翐翐靈泉重噴甘逾蜜飲焉夀與天地畢遊郡西諸山記都穆𢎞治己酉秋九月甲戌豫與客泛舟將遍遊吳郡西諸山客曰虎丘之勝甲吳下且密邇闤闠遊必自虎丘始豫諾焉亭午至山下觀憨憨泉泉為人投瓦礫塞之將泥不食從石旁上東山廟即短簿祠中龎然雜以土偶有老僧方閉關坐穴中與語頗可聽下東山北行登千人石旁有古木根出如蟠虬一本而為幹者三經清逺道士放鶴澗澗涸灌莽生焉後人亭其上既而登五聖臺僧供茗命前導西南行至一菴甚幽寂蓋宋和靖書院舊址也悵惋久之南行沿小溪復上千人石度石梁酌陸羽泉近庸僧屋其半頗減清冽出觀劔池左石刻虎丘劔池四大字是顔魯公書上兩崖壁立數仞勢欲崩裂其隂多昔人題名衆恐不能久讀遂登可月亭北有李陽氷篆生公講臺字分鐫四砥而亡其一衆皆從故道下去時已逼暝豫欲止宿客不可乃返乙亥仍泊虎丘午食出射瀆大風西北來舟遲遲行繂屢斷屢續西望天平岝崿秦餘杭諸山如龍游馬逸應接不暇過許墅入竹青塘而西日光反射影在山半霞彩絢爛丹青雜施工不能繪至通安橋已昏黑夜深抵友人朱氏宿丙子早食出朱墅北泛彭山堰午西風甚急遂由堰西北約五里至陳湖莊復五里由望湖橋南出遊湖從曲港登新豐南山共坐苔石山人有牧羊者豫問瀕湖諸山始知髙出鄧尉者曰銅坑山亞銅坑曰安山牛城嘴居游湖北與安山對峙如兩峽然而其西接太湖極北青霞一抹視洞庭兩山猶逺者無錫之九龍山也下山歡飲盡醉丁丑早雲翳翳布空中疑有變少焉日光曈曨衆游興勃發由謝莊西行復經游湖南過陸家港里許入西堰水益緩山益近岡嶺稠叠橫回峭拔呈技獻巧殆不可狀而浮圗七級聳龜山巔影落水中豫笑曰此王摩詰得意筆也泊泰定橋登虎山里許至光福寺主僧聞客至出速入方丈山峙其前者名鉢盂其左鄧尉山也壁有元人聫句詩多剝落皆不著氏名其字畫類黃豫章有墨沼從囱隙窺之僧云傳為顧野王研池殆或然也過齊堂讀唐進士顧在鎔詩刻遂上龜山坐浮圗下浮圗有巢鸛二見人戞戞作聲衆方欲呼酒僧謂七寶泉在鄧尉東麓不三里而近共出登舟經東堰已半淤塞蘆葦蒲稗生其中視西堰少劣至則舍舟遵山徑行夾道多古梅長松入僧菴有雙柿丹實纍纍可愛上山行修竹間有亭憩焉其後即七寶泉泉生石間環甃以石形如滿月深尺許掬飲甚甘僧接竹引之然不知發自何時且弔陸子之不能遭與兹泉之不遭也豫索筆題名亭上暮還光福方丈戊寅至姚家河陸行數里遊奉慈菴中故有養閒樓元季里儒徐良夫好客四方賢士多集樓上今亡獨其扁存堂背白山茶枇杷蠟梅列植左右出僧欲導觀山上泉不果三里至𤣥墓山從松篠間傴僂而上山多楊梅梅樹湖水明滅樹間衆冉冉如空中行約一里入西塔院小飲晚院之僧具湯沐宿焉己卯自西而南四百步路多古梅皆螭蟠蛟結蒼蘚被之如鱗出大道東北千步有長松五株鷹巢其一又西北二百步度石梁上萬佛閣南望太湖法華山橫亘其中漁舟數十出沒若鳬鴈然而洞庭長沙葉餘梅灣諸山隱隱在烟霧間詩思頓發北而東二百步有僧揖入小閣閣視萬佛十才一二然所據地髙出木杪山四面環之如玦景特竒僧飯客閣上仍出松花餅客作詩有不見太湖真面目眼前終恨法華山之句豫不以為然乃作詩為法華訟寃西行可百步至僧房其扁曰天開圗畫見湖最多兼見小橫山一抹由禪堂西南三百二十步有老僧房前美竹數百挺與松柏爭長地窪然下衆嘯詠焉又西三百步經僧房六以日暮不及遊還塔院宿庚辰僧陪客下山西行復經奉慈菴謁宋金紫光祿大夫黃某墓其旁有香火院僧盡出斷碑五六橫草莽間蓋𤣥墓至是行四里至銅坑山其山一名銅井僧云髙二百丈豫與客取捷上由别道山多亂石且峻拔行者多顛踣每一人踣衆皆大笑至僧菴觀所謂銅井已無水深可丈餘上大石若將壓者豫令童子入井大呼聲不得出如在瓮中山頂多竒石可望見二百里羣山在其下小山浮湖中如杯人人大快以為平生竒觀適山人送酒至遂剖橘作杯飲皆盡興庵僧煮菜供午食循道至山半勢亦陡峻皆掖以童子狼狽而下回視莫不心栗更慶以為無虞去銅坑東北三里謁宋章都官墓抵包家河登舟復從西堰過泰定橋東北七里還朱氏宿辛巳朱氏東南三里至蜀山訪王清獻公𤣥孫晉索其舊藏出清獻畫像及孝感詩族譜閲之門內有塑像置壁腳亦云是清獻公牆角塑像為尼相者清獻母張夫人也晉言清獻父死海上張氏年甫三十七抱清獻入覲時清獻生才三嵗元主恐張氏二志命殿前祝髮為比丘尼賜號無為大師住吳中妙湛禪寺出門讀草間碑碑凡三其一無為大師塔銘鄧文原撰午還未氏壬午復經彭山堰行八九里艤舟又二里至秦餘杭山夾道松如步障上六百步息足僧舍復二百三十步至大石下有泉二泓其一為雲泉石錯互若頦頷齗齶從其後視之又若狻猊卬首尻下其前磐石如卧鼓可坐二三十人入雲泉庵躋石級有古梅生石間轉東石一股西跨類猛士跂足立人行其下又轉而西鑿石為階旁設以闌杌􅑾不可憑屋壁讀李武選吳太史張子靜史明古諸公聫句東行有巨石閣崖上欲墮又上得大石巖上俯下嵌中像開山僧衆小憩午酌庵之北樓日暮下山與諸客别是夕宿通安橋癸未入城蓋自甲戌至癸未凡十日皆風日清美舟楫往還百數十里歷名山六小山二而諸客者皆冠衣詳雅從容尊俎間莫不目飽意滿充然有得而忘其疲其慶幸不既多乎遂次第筆之啓好遊者郎官柏詩序金問蘇之崑山古之婁縣也地大物盛為今圻內望邑按郡志城本吳子夀夢所築山在城中而石多似玉因以得名自昔靈區奧壤紺園琳宇環布其下傳歷滋久完葺弗繼則委頓於荒烟野草之間至若名人逹士髙墳大冢皆歷歷在望仁人孝子於其先其封樹等威禮所得為者宜無所不用其極矣其或世澤告衰而殘碑賸枿見欺於狐兔而增過客倣徨者自非有忠厚之人居可為之地烏能興起哉正統丙辰廣陽羅延齡由兵馬副指揮來宰是邑既視篆即進父老詢民利病而興除之曽未浹期政和嵗稔輿情大悅暇日復從吏民循山之麓顧瞻徘徊喟然歎曰山為一邑之鎮民賴以安而凋敝若此非古人教護屬功之意乃率其民相與植柏於上鑿石通路而塞其旁蹊疆理既嚴樵蘇絶迹且方事之際隂雲蔽虧霡霂時至未幾而條枚四合蒼翠彌望邑人感之名其所植為郎官柏儒林君子即其題為詩以美之而兵科給事中王用節等謁豫文以序其實詩不云乎維桑與梓必恭敬止靡瞻匪父靡依匪母蓋人之思慕其親而不見則寓情桑梓而不能已焉矧體魄之所安乎漢天子以之而來趙他安平君以之而激密人之忿天理民彞有不容己者不待丁寧訓告而自然之應捷於桴鼓此郎官柏之名所由著也嘗論徂徠新甫使無生植則亦魯邦之培塿耳而詩人詠之萬方誦之千古之下傳之者豈徒然哉然則延齡之德與兹山兹柏同於不朽者寧不本於諸君子之言乎三髙祠議丘霽蘇郡吳江縣有宋時所建三髙祠祀越范蠡晉張翰唐陸龜䝉蓋取其功成身退扁舟五湖駕秋風而思蓴鱸逸江湖而召不起皆不溺於功名富貴脫然髙隱清風峻節可以風士習勵貪叨而不知止者是有益於風教也禮有功德於民則祀之次而忠臣孝子節士烈婦可範後勵俗亦祀之者必仕於其地産於其鄉而為鄉人所嚮慕斯為有益風教如張翰吳人龜䝉居松江甫里而吳江祀之固宜也至於范蠡南郡華容人事越王勾踐初勾踐興師伐吳吳王夫差發精兵擊勾踐於夫椒遂圍於㑹稽勾踐用范蠡計令大夫種以美女寶貨獻吳太宰嚭勸夫差罷兵而歸勾踐子胥諫不聽以死勾踐歸國苦身嘗膽欲雪㑹稽之恥秣馬厲兵二十餘年始興兵伐吳遂棲夫差於姑蘇之山夫差使公孫雄肉袒膝行請成於勾踐勾踐不忍欲許之蠡曰㑹稽之事天以越賜吳吳不取今天以吳賜越其可逆天乎勾踐聽蠡言遂平吳地夫蠡之謀實忠於越而於吳則讐也今吳江之民得非吳之遺民乎安有遺民忘恥祀讐而可以風勵士習乎雖有不仕之節扁舟五湖之髙於吳民何嚮慕焉昔夫差欲歸勾踐子胥因諫不行被嚭讒之而賜死今吳民世祀子胥以其忠於吳而有功於民已於義裁之蠡亦胥之讐豈可同祀於吳地耶宋之建祠元之增修本朝載在祀典范成大亦嘗為記時未質以吳之遺民忘恥祀讐之事故因循數百年未釐正者無乃反傷於風教耶余叨守郡因閲祀典至三髙祠缺吳中金石新編卷八
